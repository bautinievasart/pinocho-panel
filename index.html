<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ByBauti - Finance PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--bg:#F8FAFD;
--card:#FFF;
--text:#1B2559;
--sec:#A3AED0;
--accent:#4318FF;
--green:#05CD99;
--red:#EE5D50;
}
body{margin:0;font-family:'Plus Jakarta Sans';background:var(--bg)}
.sidebar{
position:fixed;width:220px;height:100%;background:#fff;padding:20px
}
.nav{display:flex;flex-direction:column;gap:10px}
.nav div{cursor:pointer;padding:10px;border-radius:10px}
.nav .active{background:var(--accent);color:#fff}
.main{margin-left:240px;padding:30px}
.card{background:#fff;padding:20px;border-radius:20px;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.title{font-size:12px;color:var(--sec)}
.big{font-size:26px;font-weight:800}
.green{color:var(--green)}
.red{color:var(--red)}
table{width:100%}
td{padding:6px}
</style>
</head>

<body>

<div class="sidebar">
<div class="nav">
<div class="active" onclick="show('dash',this)">Dashboard</div>
<div onclick="show('ops',this)">Operaciones</div>
<div onclick="show('caja',this)">Caja</div>
</div>
</div>

<div class="main">

<!-- DASH -->
<div id="dash">

<div id="alert" style="display:none;background:#05CD99;color:#fff;padding:10px;border-radius:10px;margin-bottom:10px">
🚀 OPORTUNIDAD DETECTADA
</div>

<div class="grid">

<div class="card">
<div class="title">Capital</div>
<div id="cap" class="big">$100000</div>
</div>

<div class="card">
<div class="title">Mejor Arbitraje</div>
<div id="best" class="big">$0</div>
<div id="bestEx"></div>
</div>

<div class="card">
<div class="title">Dólares</div>
<div id="dolares"></div>
</div>

<div class="card">
<div class="title">Crypto</div>
<div id="crypto"></div>
</div>

</div>

<div class="card">
<div class="title">Scanner USDT</div>
<table id="arb"></table>
</div>

</div>

<!-- OPERACIONES -->
<div id="ops" style="display:none">
<div class="card">
<h3>Registrar operación</h3>
<input id="monto" placeholder="Monto">
<input id="buy" placeholder="Compra">
<input id="sell" placeholder="Venta">
<button onclick="addOp()">Agregar</button>
</div>

<div class="card">
<table id="opsTable"></table>
</div>
</div>

<!-- CAJA -->
<div id="caja" style="display:none">

<div class="card">
<h3>Nuevo movimiento</h3>
<input id="desc" placeholder="Detalle">
<input id="montoCaja" placeholder="Monto">
<select id="tipo">
<option value="in">Ingreso</option>
<option value="out">Egreso</option>
</select>
<button onclick="addCaja()">Agregar</button>
</div>

<div class="card">
<h3>Resumen</h3>
<div id="saldo"></div>
</div>

<div class="card">
<table id="cajaTable"></table>
</div>

</div>

</div>

<script>

// --- NAV ---
function show(id,el){
document.querySelectorAll('.main > div').forEach(d=>d.style.display='none');
document.getElementById(id).style.display='block';
document.querySelectorAll('.nav div').forEach(n=>n.classList.remove('active'));
el.classList.add('active');
}

// --- DATA ---
let CAPITAL = 100000;
let ops = JSON.parse(localStorage.getItem('ops')) || [];
let caja = JSON.parse(localStorage.getItem('caja')) || [];

// --- FEES ---
const FEE_P2P = 0.006;
const FEE_TRADE = 0.001;

// --- ARBITRAJE ---
async function update(){

const dDol = await (await fetch('https://criptoya.com/api/dolares')).json();
const dUsdt = await (await fetch('https://criptoya.com/api/usdt/ars')).json();

const p2p = dUsdt.binancep2p?.bid || 0;

// DOLARES
document.getElementById('dolares').innerHTML=`
Blue $${dDol.blue?.ask}<br>
MEP $${dDol.mep?.al30?.ci?.price?.toFixed(0)}<br>
CCL $${dDol.ccl?.al30?.ci?.price?.toFixed(0)}<br>
Crypto $${p2p.toFixed(0)}
`;

// ARBITRAJE
let exs=['lemoncash','ripio','belo','buenbit'];
let arr=[];

exs.forEach(e=>{
let ex=dUsdt[e];
if(!ex?.ask)return;

let usdt=CAPITAL/ex.ask;
usdt*=1-FEE_TRADE;

let ars=usdt*p2p;
ars*=1-FEE_P2P;

let gan=ars-CAPITAL;
let perc=(gan/CAPITAL)*100;

if(perc>0.3) arr.push({e,gan,perc,price:ex.ask});
});

arr.sort((a,b)=>b.perc-a.perc);

let html='';
let best=0,bestEx='';

arr.forEach(o=>{
if(o.gan>best){best=o.gan;bestEx=o.e;}
html+=`<tr>
<td>${o.e}</td>
<td>$${o.price.toFixed(0)}</td>
<td>$${p2p.toFixed(0)}</td>
<td class="green">$${o.gan.toFixed(0)}</td>
<td>${o.perc.toFixed(2)}%</td>
</tr>`;
});

document.getElementById('arb').innerHTML=html||'Sin oportunidades';
document.getElementById('best').innerText='$'+best.toFixed(0);
document.getElementById('bestEx').innerText=bestEx;

// ALERTA
document.getElementById('alert').style.display=best>0?'block':'none';

// CRYPTO
let coins=['btc','eth','sol'];
let chtml='';

for(let c of coins){
let d=await (await fetch(`https://criptoya.com/api/${c}/ars`)).json();
let prices=[];

['binance','ripio','belo'].forEach(ex=>{
if(d[ex]?.bid)prices.push({ex,p:d[ex].bid});
});

prices.sort((a,b)=>b.p-a.p);

let spread=((prices[0].p/prices.at(-1).p)-1)*100;

chtml+=`${c.toUpperCase()} ${spread.toFixed(2)}%<br>`;
}

document.getElementById('crypto').innerHTML=chtml;

}

// --- OPERACIONES ---
function addOp(){
let m=+monto.value;
let b=+buy.value;
let s=+sell.value;

let g=(m/b*s)-m;

ops.unshift({m,g});
localStorage.setItem('ops',JSON.stringify(ops));
renderOps();
}

function renderOps(){
opsTable.innerHTML=ops.map(o=>`
<tr>
<td>$${o.m}</td>
<td class="${o.g>0?'green':'red'}">$${o.g.toFixed(0)}</td>
</tr>`).join('');
}

// --- CAJA ---
function addCaja(){
let d=desc.value;
let m=+montoCaja.value;
let t=tipo.value;

caja.unshift({d,m,t});
localStorage.setItem('caja',JSON.stringify(caja));
renderCaja();
}

function renderCaja(){
let total=0;

cajaTable.innerHTML=caja.map(c=>{
total+=c.t==='in'?c.m:-c.m;
return `<tr>
<td>${c.d}</td>
<td class="${c.t==='in'?'green':'red'}">$${c.m}</td>
</tr>`;
}).join('');

saldo.innerText='Saldo: $'+total;
}

// INIT
renderOps();
renderCaja();
update();
setInterval(update,20000);

</script>

</body>
</html>
