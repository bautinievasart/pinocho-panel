<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinocho CashPanel - Live</title>
    <style>
        :root {
            --bg-color: #E6E9F0;
            --text-main: #2D3A54;
            --text-sec: #808D9A;
            --card-bg: #FFFFFF;
            --led-rojo: linear-gradient(135deg, #FF6F6F, #FF9B9B);
            --led-verde: linear-gradient(135deg, #6FDC8C, #A7EEB4);
            --led-base: linear-gradient(135deg, #FF9966, #FF66CC);
            --accent: #4A90E2;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; min-height: 100vh;
        }

        .cash-panel { width: 900px; max-width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        .card {
            background: var(--card-bg); border-radius: 24px; padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.04); position: relative;
            overflow: hidden;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; color: var(--text-sec); font-size: 13px; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CONTADOR ESTÉTICO --- */
        .timer-container {
            display: flex; align-items: center; gap: 10px; background: #f0f2f5; padding: 5px 12px; border-radius: 20px;
        }
        
        .timer-ring {
            width: 18px; height: 18px; border: 3px solid #ddd; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #seconds-left { font-family: monospace; font-size: 14px; color: var(--accent); font-weight: bold; }

            font-size: 48
