<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByBauti - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #F8FAFD;
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #1B2559;
            --text-sec: #A3AED0;
            --accent: #4318FF;
            --success: #05CD99;
            --danger: #EE5D50;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }

        /* Sidebar similar a tu captura */
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 40px 20px; border-right: 1px solid #E9EDF7; z-index: 1000; transition: 0.3s; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; padding-left: 15px; letter-spacing: -1px; }
        .logo span { color: var(--accent); }
        .nav-container { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { color: var(--text-sec); padding: 12px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; font-weight: 600; text-decoration: none; }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2); }

        .main-wrapper { margin-left: 260px; width: 100%; padding: 40px; transition: 0.3s; }
        .view-section { display: none; max-width: 1200px; margin: 0 auto; }
        .view-section.active { display: block; }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 25px; }

        /* Tarjetas Superiores */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .card-mini { background: var(--card-bg); border-radius: 20px; padding: 24px; box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); border: 1px solid rgba(233, 237, 247, 0.6); }
        .card-mini .label { font-size: 12px; color: var(--text-sec); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
        .card-mini .value { font-size: 36px; font-weight: 800; color: #7038FF; }

        /* Contenedor de Tablas Estilo Tu Captura */
        .card-table { background: var(--card-bg); border-radius: 20px; padding: 30px; box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); border: 1px solid rgba(233, 237, 247, 0.6); margin-bottom: 24px; }
        .card-table h3 { font-size: 14px; color: var(--text-sec); text-transform: uppercase; margin-bottom: 20px; letter-spacing: 0.5px; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 12px; font-weight: 700; border-bottom: 1px solid #F4F7FE; }
        td { padding: 16px 12px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 700; }

        .up { color: var(--success); }
        .down { color: var(--danger); }
        #timer { font-size: 12px; background: #eee; padding: 4px 10px; border-radius: 20px; font-weight: 700; }

        @media (max-width: 850px) {
            .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; padding: 0; border-right: none; display: flex; align-items: center; }
            .logo { display: none; }
            .nav-container { flex-direction: row; width: 100%; justify-content: space-around; }
            .main-wrapper { margin-left: 0; padding: 20px 15px 90px 15px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-container">
            <div class="nav-item active" onclick="show('v-dash', this)"><i class="fa-solid fa-chart-pie"></i><span>Dash</span></div>
            <div class="nav-item" onclick="show('v-ops', this)"><i class="fa-solid fa-list-check"></i><span>Ops</span></div>
            <div class="nav-item" onclick="show('v-pre', this)"><i class="fa-solid fa-wallet"></i><span>Caja</span></div>
            <div class="nav-item" onclick="cambiarCapital()"><i class="fa-solid fa-sliders"></i><span>Cap</span></div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="v-dash" class="view-section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Panel de Control</h1>
                <span id="timer">30s</span>
            </div>

            <div class="grid-2">
                <div class="card-mini">
                    <div class="label">Capital Trabajando</div>
                    <div class="value" id="disp-cap">$100.000</div>
                </div>
                <div class="card-mini">
                    <div class="label">Mejor Opción Ganancia</div>
                    <div class="value" id="top-gan" style="color: #FF5B87;">$0.00</div>
                    <div id="top-ex" style="font-weight: 700; color: var(--text-sec); font-size: 12px;">Cargando...</div>
                </div>
            </div>

            <!-- TABLA 1: DÓLARES -->
            <div class="card-table">
                <h3>Cotización Dólares & Brecha</h3>
                <table>
                    <thead><tr><th>TIPO</th><th>COMPRA</th><th>VENTA</th><th>VS USDT</th></tr></thead>
                    <tbody id="table-dolares"></tbody>
                </table>
            </div>

            <!-- TABLA 2: USDT ARBITRAJE -->
            <div class="card-table">
                <h3>Arbitraje USDT (ARS)</h3>
                <table>
                    <thead><tr><th>EXCHANGE</th><th>COMPRA</th><th>VENTA</th><th>GANANCIA</th></tr></thead>
                    <tbody id="table-p2p"></tbody>
                </table>
            </div>

            <!-- TABLA 3: ALTCOINS -->
            <div class="card-table">
                <h3>Oportunidades Altcoins</h3>
                <table>
                    <thead><tr><th>CRYPTO</th><th>MEJOR VENTA</th><th>PRECIO ARS</th><th>ESTADO</th></tr></thead>
                    <tbody id="table-alts"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let CAPITAL = 100000; 
        let segs = 30;

        function show(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function updateMarket() {
            try {
                // Datos de USDT
                const rUsdt = await fetch('https://criptoya.com/api/usdt/ars/1');
                const dUsdt = await rUsdt.json();
                const p2p = dUsdt.binancep2p.bid; // El precio al que vendés en P2P

                // Datos de Dólares
                const rDol = await fetch('https://criptoya.com/api/dolares');
                const dDol = await rDol.json();

                // 1. Lógica Dólares
                document.getElementById('table-dolares').innerHTML = `
                    <tr><td>DÓLAR MEP (AL30)</td><td>-</td><td>$${dDol.mep.al30.ci.price.toFixed(2)}</td><td class="up">+${((p2p/dDol.mep.al30.ci.price-1)*100).toFixed(2)}%</td></tr>
                    <tr><td>DÓLAR BLUE</td><td>$${dDol.blue.bid}</td><td>$${dDol.blue.ask}</td><td>-</td></tr>
                `;

                // 2. Lógica USDT Arbitraje (Calculado real)
                const exs = ['lemoncash', 'belo', 'buenbit', 'fiwind', 'ripio'];
                let hUsdt = '', mGan = -99999, mEx = '';

                exs.forEach(e => {
                    if(dUsdt[e]) {
                        const compra = dUsdt[e].ask; // Lo que pagás por el USDT
                        const ganancia = (CAPITAL / compra * p2p) - CAPITAL;
                        if(ganancia > mGan) { mGan = ganancia; mEx = e.toUpperCase(); }
                        
                        hUsdt += `
                            <tr>
                                <td>${e.toUpperCase()}</td>
                                <td>$${compra.toLocaleString()}</td>
                                <td>$${p2p.toLocaleString()}</td>
                                <td class="${ganancia > 0 ? 'up' : 'down'}">$${ganancia.toFixed(0)}</td>
                            </tr>`;
                    }
                });
                document.getElementById('table-p2p').innerHTML = hUsdt;
                document.getElementById('top-gan').innerText = `$${mGan.toFixed(0)}`;
                document.getElementById('top-ex').innerText = mEx;

                // 3. Lógica Altcoins
                const alts = ['sol', 'xrp', 'ltc'];
                let hAlts = '';
                for(let coin of alts){
                    const rAlt = await fetch(`https://criptoya.com/api/${coin}/ars/1`);
                    const dAlt = await rAlt.json();
                    let mejorVenta = 0, mejorEx = '---';
                    
                    exs.forEach(e => {
                        if(dAlt[e] && dAlt[e].bid > mejorVenta) {
                            mejorVenta = dAlt[e].bid;
                            mejorEx = e.toUpperCase();
                        }
                    });
                    hAlts += `<tr><td>${coin.toUpperCase()}</td><td>${mejorEx}</td><td>$${mejorVenta.toLocaleString()}</td><td>Estable</td></tr>`;
                }
                document.getElementById('table-alts').innerHTML = hAlts;

                segs = 30;
            } catch(e) { console.error(e); }
        }

        setInterval(() => { 
            segs--; 
            document.getElementById('timer').innerText = segs+'s'; 
            if(segs <= 0) updateMarket(); 
        }, 1000);

        function cambiarCapital() {
            let p = prompt("Ingresa el capital en ARS para calcular:", CAPITAL);
            if(p) { CAPITAL = parseFloat(p); document.getElementById('disp-cap').innerText = '$' + CAPITAL.toLocaleString(); updateMarket(); }
        }

        updateMarket();
    </script>
</body>
</html>
