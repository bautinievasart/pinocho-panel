<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly Elite | Bauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primario: #6366f1; --fondo: #f8fafc; --texto-oscuro: #0f172a; --texto-gris: #64748b;
            --blanco: #ffffff; --exito: #10b981; --error: #f43f5e;
            --gradiente-ingreso: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradiente-gasto: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            --gradiente-ahorro: linear-gradient(135deg, #6366f1 0%, #a5b4fc 100%);
            --sombra: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #cbd5e1; display: flex; justify-content: center; }

        .app-container {
            width: 100%; max-width: 480px; background: var(--fondo); min-height: 100vh;
            position: relative; box-shadow: 0 0 60px rgba(0,0,0,0.2); padding-bottom: 110px; overflow-x: hidden;
        }

        .vista { display: none; animation: fadeIn 0.3s ease; padding-bottom: 20px; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        .header-app {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); color: white;
            padding: 50px 25px 90px 25px; border-bottom-left-radius: 45px; border-bottom-right-radius: 45px;
        }
        .monto-balance { font-size: 3.5rem; font-weight: 800; margin-top: 5px; letter-spacing: -2px; }

        /* --- TARJETAS --- */
        .contenedor-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; margin-top: -50px; }
        .tarjeta-cat {
            background: var(--blanco); padding: 22px 10px; border-radius: 26px; box-shadow: var(--sombra);
            text-align: center; border: 1px solid rgba(0,0,0,0.01);
        }
        .tarjeta-cat span { font-size: 0.75rem; color: var(--texto-gris); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 8px; }
        .num-gradiente { font-size: 1.25rem; font-weight: 800; background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: block; }
        .ingreso-txt { background-image: var(--gradiente-ingreso); }
        .gasto-txt { background-image: var(--gradiente-gasto); }
        .ahorro-txt { background-image: var(--gradiente-ahorro); }

        /* --- MOVIMIENTOS --- */
        .item-movimiento { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 16px; background: white; border-radius: 20px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .btn-borrar { color: #cbd5e1; border: none; background: none; padding: 5px; cursor: pointer; transition: 0.2s; }
        .btn-borrar:hover { color: var(--error); }

        /* --- NAV --- */
        .nav-inferior {
            position: absolute; bottom: 0; left: 0; right: 0; height: 95px;
            background: rgba(255, 255, 255, 0.96); border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 25px; backdrop-filter: blur(10px);
        }
        .nav-link { color: #cbd5e1; cursor: pointer; transition: 0.3s; padding: 12px; border-radius: 15px; }
        .nav-link.activo { color: var(--primario); background: #f5f3ff; }
        .btn-mas { 
            width: 60px; height: 60px; background: var(--texto-oscuro); border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; color: white; 
            transform: translateY(-30px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: none; 
        }

        .widget { background: var(--blanco); border-radius: 30px; padding: 25px; margin-bottom: 25px; box-shadow: var(--sombra); }
        .titulo-seccion { font-size: 1.2rem; font-weight: 800; color: var(--texto-oscuro); margin-bottom: 15px; padding: 0 5px; }
        
        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 15px; background: #f8fafc; font-size: 1rem; font-weight: 600; outline: none; }
        .btn-pro { width: 100%; padding: 18px; background: var(--primario); color: white; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; font-size: 1rem; }

        #modal-registro { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.4); display:none; align-items:flex-end; z-index:2000; backdrop-filter: blur(6px); }
        .modal-contenido { background: var(--blanco); width:100%; padding:40px 25px; border-radius: 45px 45px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- VISTA INICIO -->
        <div id="vista-inicio" class="vista activa">
            <div class="header-app">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="background:rgba(255,255,255,0.2); width:45px; height:45px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-weight:800; border:1px solid rgba(255,255,255,0.3);" id="avatar-iniciales">B</div>
                        <p style="font-weight:700;" id="saludo-nombre">Hola, Bauti</p>
                    </div>
                </div>
                <p style="opacity:0.8; font-size:0.9rem;">Balance Total</p>
                <h1 class="monto-balance" id="balance-total">$0</h1>
                <div style="background:rgba(0,0,0,0.15); padding:6px 12px; border-radius:50px; display:inline-flex; align-items:center; gap:6px; font-size:0.75rem; margin-top:10px;" id="api-dolar">
                    <i data-lucide="globe" size="14"></i> Cargando mercado...
                </div>
            </div>

            <div class="contenedor-grid">
                <div class="tarjeta-cat"><span>Ingresos</span><strong class="num-gradiente ingreso-txt" id="resumen-ingresos">$0</strong></div>
                <div class="tarjeta-cat"><span>Gastos</span><strong class="num-gradiente gasto-txt" id="resumen-gastos">$0</strong></div>
                <div class="tarjeta-cat"><span>Ahorro</span><strong class="num-gradiente ahorro-txt" id="resumen-ahorro-neto">$0</strong></div>
            </div>

            <div style="padding: 35px 20px;">
                <h3 class="titulo-seccion">Actividad</h3>
                <div class="widget"><canvas id="graficoFlujo" height="160"></canvas></div>
                <h3 class="titulo-seccion">Movimientos</h3>
                <div id="lista-movimientos-inicio"></div>
            </div>
        </div>

        <!-- VISTA ANÁLISIS (NUEVA FUNCIÓN) -->
        <div id="vista-analisis" class="vista">
            <div style="padding: 50px 25px;">
                <h1 style="font-weight:800; font-size:1.8rem;">Análisis de Gastos</h1>
                <p style="color:var(--texto-gris); margin-bottom:30px;">Distribución porcentual de tus egresos.</p>
                <div class="widget">
                    <canvas id="graficoTorta" height="250"></canvas>
                </div>
                <div id="metricas-analisis"></div>
            </div>
        </div>

        <!-- VISTA METAS -->
        <div id="vista-metas" class="vista">
            <div style="padding: 50px 25px;">
                <h1 style="font-weight:800; font-size:1.8rem;">Mis Metas</h1>
                <div class="widget">
                    <input type="text" id="meta-nombre" placeholder="Nombre (Ej: Viaje)">
                    <input type="number" id="meta-monto" placeholder="Monto Objetivo $">
                    <button class="btn-pro" onclick="crearMeta()">Establecer Objetivo</button>
                </div>
                <div id="lista-metas"></div>
            </div>
        </div>

        <!-- NAVEGACIÓN -->
        <div class="nav-inferior">
            <div class="nav-link activo" onclick="navegar('vista-inicio', this)"><i data-lucide="home"></i></div>
            <div class="nav-link" onclick="navegar('vista-metas', this)"><i data-lucide="target"></i></div>
            <button class="btn-mas" onclick="abrirModal()"><i data-lucide="plus"></i></button>
            <div class="nav-link" onclick="navegar('vista-analisis', this)"><i data-lucide="bar-chart-3"></i></div>
            <div class="nav-link" onclick="navegar('vista-ajustes', this)"><i data-lucide="user"></i></div>
        </div>

        <!-- VISTA AJUSTES -->
        <div id="vista-ajustes" class="vista">
            <div style="padding: 50px 25px;">
                <h2 class="titulo-seccion">Ajustes</h2>
                <div class="widget">
                    <input type="text" id="config-nombre" placeholder="Tu Nombre">
                    <button class="btn-pro" onclick="guardarConfiguracion()">Guardar</button>
                </div>
                <button onclick="resetearDatos()" style="color:var(--error); font-weight:800; width:100%; border:none; background:none; margin-top:20px;">BORRAR TODO</button>
            </div>
        </div>

        <!-- MODAL REGISTRO -->
        <div id="modal-registro" onclick="if(event.target == this) cerrarModal()">
            <div class="modal-contenido">
                <h3 style="margin-bottom:25px; font-weight:800; font-size:1.4rem;">Nuevo Registro</h3>
                <input type="text" id="reg-desc" placeholder="Descripción (Ej: Pizza, Sueldo)">
                <input type="number" id="reg-monto" placeholder="Monto $">
                <select id="reg-tipo">
                    <option value="egreso">Gasto (-)</option>
                    <option value="ingreso">Ingreso (+)</option>
                </select>
                <button class="btn-pro" onclick="registrarMovimiento()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('finanzly_v4')) || { 
            usuario: { nombre: 'Bauti' }, movimientos: [], metas: [] 
        };

        function navegar(id, el) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('activo'));
            document.getElementById(id).classList.add('activa');
            if(el) el.classList.add('activo');
            if(id === 'vista-analisis') renderGraficoAnalisis();
            if(id === 'vista-inicio') renderGraficoPrincipal();
        }

        function abrirModal() { document.getElementById('modal-registro').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-registro').style.display = 'none'; }

        function registrarMovimiento() {
            const desc = document.getElementById('reg-desc').value;
            const monto = parseFloat(document.getElementById('reg-monto').value);
            const tipo = document.getElementById('reg-tipo').value;
            if(!desc || !monto) return;
            db.movimientos.unshift({ id: Date.now(), desc, monto, tipo, fecha: 'Hoy' });
            actualizarTodo();
            cerrarModal();
        }

        function eliminarMovimiento(id) {
            db.movimientos = db.movimientos.filter(m => m.id !== id);
            actualizarTodo();
        }

        function crearMeta() {
            const nombre = document.getElementById('meta-nombre').value;
            const monto = parseFloat(document.getElementById('meta-monto').value);
            if(!nombre || !monto) return;
            db.metas.push({ id: Date.now(), nombre, monto });
            actualizarTodo();
        }

        function actualizarTodo() {
            localStorage.setItem('finanzly_v4', JSON.stringify(db));
            actualizarUI();
        }

        function actualizarUI() {
            document.getElementById('saludo-nombre').innerText = `Hola, ${db.usuario.nombre}`;
            document.getElementById('avatar-iniciales').innerText = db.usuario.nombre[0].toUpperCase();

            let ing = db.movimientos.filter(m => m.tipo === 'ingreso').reduce((a,b) => a + b.monto, 0);
            let egr = db.movimientos.filter(m => m.tipo === 'egreso').reduce((a,b) => a + b.monto, 0);
            let total = ing - egr;

            document.getElementById('balance-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('resumen-ingresos').innerText = `$${ing.toLocaleString()}`;
            document.getElementById('resumen-gastos').innerText = `$${egr.toLocaleString()}`;
            document.getElementById('resumen-ahorro-neto').innerText = `$${(ing-egr).toLocaleString()}`;

            const lista = document.getElementById('lista-movimientos-inicio');
            lista.innerHTML = db.movimientos.slice(0, 5).map(m => `
                <div class="item-movimiento">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="width:40px; height:40px; border-radius:12px; background:${m.tipo==='ingreso'?'#dcfce7':'#fee2e2'}; color:${m.tipo==='ingreso'?'#10b981':'#f43f5e'}; display:flex; align-items:center; justify-content:center;">
                            <i data-lucide="${m.tipo==='ingreso'?'arrow-up-right':'arrow-down-left'}" size="18"></i>
                        </div>
                        <div><p style="font-weight:700; font-size:0.9rem;">${m.desc}</p><span style="font-size:0.7rem; color:var(--texto-gris);">${m.fecha}</span></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <strong style="font-weight:800;">${m.tipo==='ingreso'?'+':'-'}$${m.monto}</strong>
                        <button class="btn-borrar" onclick="eliminarMovimiento(${m.id})"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                </div>
            `).join('');

            // UI de Metas
            document.getElementById('lista-metas').innerHTML = db.metas.map(m => `
                <div class="widget">
                    <p style="font-weight:800; margin-bottom:10px;">${m.nombre}</p>
                    <div style="height:10px; background:#f1f5f9; border-radius:10px; overflow:hidden;">
                        <div style="width:${Math.min(100, (total/m.monto)*100)}%; height:100%; background:var(--primario);"></div>
                    </div>
                    <p style="font-size:0.75rem; margin-top:8px; font-weight:700;">$${total.toLocaleString()} de $${m.monto.toLocaleString()}</p>
                </div>
            `).join('');

            lucide.createIcons();
            obtenerDolar();
        }

        async function obtenerDolar() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const rate = data.rates.ARS || 900;
                const totalArs = db.movimientos.reduce((a,m)=> m.tipo==='ingreso'?a+m.monto:a-m.monto, 0);
                document.getElementById('api-dolar').innerHTML = `<i data-lucide="trending-up" size="14"></i> Equivale a U$D ${(totalArs/rate).toFixed(2)}`;
                lucide.createIcons();
            } catch(e) {}
        }

        function renderGraficoPrincipal() {
            const ctx = document.getElementById('graficoFlujo').getContext('2d');
            if(window.chart1) window.chart1.destroy();
            window.chart1 = new Chart(ctx, {
                type: 'line',
                data: { labels: ['L','M','M','J','V','S','D'], datasets: [{ data: [10, 25, 15, 40, 30, 45, 40], borderColor: '#6366f1', tension:0.4, fill:true, backgroundColor:'rgba(99,102,241,0.05)', pointRadius:0 }] },
                options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
            });
        }

        function renderGraficoAnalisis() {
            const ctx = document.getElementById('graficoTorta').getContext('2d');
            const gastos = db.movimientos.filter(m => m.tipo === 'egreso');
            const labels = gastos.map(m => m.desc);
            const data = gastos.map(m => m.monto);

            if(window.chart2) window.chart2.destroy();
            window.chart2 = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length ? labels : ['Sin datos'],
                    datasets: [{
                        data: data.length ? data : [1],
                        backgroundColor: ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { plugins:{legend:{position:'bottom', labels:{font:{weight:700, family:'Plus Jakarta Sans'}}}} }
            });
        }

        function guardarConfiguracion() {
            db.usuario.nombre = document.getElementById('config-nombre').value || 'Bauti';
            actualizarTodo();
            alert("Perfil actualizado");
        }

        function resetearDatos() { if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); } }

        actualizarUI();
        renderGraficoPrincipal();
    </script>
</body>
</html>
