<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Final Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #f8fafc; --primary: #4f46e5; --text: #0f172a; --success: #10b981; --error: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header con Gradiente Animado */
        .header {
            background: linear-gradient(-45deg, #4f46e5, #9333ea, #2563eb);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
            padding: 50px 20px 40px; color: white; text-align: center;
            border-radius: 0 0 40px 40px; flex-shrink: 0;
        }
        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        .balance-val { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; }

        /* Contenedor de Contenido */
        .content { flex: 1; overflow-y: auto; padding: 0 20px 100px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -30px; margin-bottom: 25px; }
        .card { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); text-align: center; }
        .val-in { color: var(--success); font-weight: 800; font-size: 1.2rem; }
        .val-out { color: var(--error); font-weight: 800; font-size: 1.2rem; }

        /* Lista de Movimientos */
        .item { background: white; padding: 15px; border-radius: 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .btn-del { background: #fee2e2; border: none; padding: 8px; border-radius: 10px; color: var(--error); }

        /* Barra de Navegación */
        nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #f1f5f9; padding-bottom: 15px; }
        .add-btn { width: 60px; height: 60px; background: var(--text); color: white; border: none; border-radius: 20px; margin-top: -40px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); font-size: 24px; }

        /* Modal */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 100; }
        .modal-body { background: white; width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #f1f5f9; background: #f8fafc; font-weight: 600; outline: none; }
        .save-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body>

    <div class="header">
        <p style="font-size: 0.7rem; font-weight: 800; opacity: 0.8; letter-spacing: 2px;">DISPONIBLE</p>
        <div class="balance-val" id="total-balance">$0</div>
    </div>

    <div class="content">
        <div class="stats-grid">
            <div class="card"><span>Ingresos</span><div class="val-in" id="total-in">+$0</div></div>
            <div class="card"><span>Gastos</span><div class="val-out" id="total-out">-$0</div></div>
        </div>

        <div id="v-home">
            <h4 style="margin-bottom: 15px; font-weight: 800;">Actividad</h4>
            <div id="list-container"></div>
        </div>

        <div id="v-metas" style="display:none">
            <h4 style="margin-bottom: 15px; font-weight: 800;">Metas</h4>
            <div id="goals-container"></div>
        </div>
    </div>

    <nav>
        <div onclick="toggleView('home')"><i data-lucide="home"></i></div>
        <button class="add-btn" onclick="openModal()">+</button>
        <div onclick="toggleView('metas')"><i data-lucide="target"></i></div>
    </nav>

    <div id="modal" onclick="if(event.target==this) closeModal()">
        <div class="modal-body">
            <h3 style="margin-bottom: 15px">Nuevo Movimiento</h3>
            <input type="text" id="in-desc" placeholder="Descripción">
            <input type="number" id="in-amount" placeholder="Monto ($)">
            <select id="in-type">
                <option value="out">Gasto</option>
                <option value="in">Ingreso</option>
            </select>
            <button class="save-btn" id="save-trigger">Guardar Registro</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN (REEMPLAZAR CON TUS DATOS)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            appId: "TU_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const coupleID = "billetera_compartida_1";
        const period = new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' });

        // FUNCIÓN DE GUARDADO (ATTACHED DIRECTLY TO BUTTON)
        document.getElementById('save-trigger').onclick = function() {
            const desc = document.getElementById('in-desc').value;
            const amount = parseFloat(document.getElementById('in-amount').value);
            const type = document.getElementById('in-type').value;

            if (!desc || isNaN(amount)) {
                alert("Completa todos los campos");
                return;
            }

            db.ref(`couples/${coupleID}/data/${period}/m`).push({
                desc, amount, type,
                date: new Date().toLocaleDateString(),
                ts: firebase.database.ServerValue.TIMESTAMP
            }).then(() => {
                closeModal();
                document.getElementById('in-desc').value = "";
                document.getElementById('in-amount').value = "";
            }).catch(e => alert("Error al guardar: " + e.message));
        };

        // ESCUCHA DE DATOS
        db.ref(`couples/${coupleID}/data/${period}/m`).on('value', (snap) => {
            let tin = 0, tout = 0, html = "";
            const data = snap.val();

            if (data) {
                const items = Object.entries(data).sort((a,b) => b[1].ts - a[1].ts);
                items.forEach(([id, x]) => {
                    const isI = x.type === 'in';
                    if (isI) tin += x.amount; else tout += x.amount;
                    html += `
                        <div class="item">
                            <div><strong>${x.desc}</strong><br><small style="color:gray">${x.date}</small></div>
                            <div style="display:flex; align-items:center; gap:10px">
                                <b style="color:${isI?'var(--success)':'var(--text)'}">${isI?'+':'-'}$${x.amount}</b>
                                <button class="btn-del" onclick="deleteItem('${id}')">✕</button>
                            </div>
                        </div>`;
                });
            }

            document.getElementById('total-balance').innerText = `$${(tin - tout).toLocaleString()}`;
            document.getElementById('total-in').innerText = `+$${tin.toLocaleString()}`;
            document.getElementById('total-out').innerText = `-$${tout.toLocaleString()}`;
            document.getElementById('list-container').innerHTML = html || '<p style="text-align:center; padding:20px; color:gray">No hay movimientos</p>';
        });

        // FUNCIONES DE UI
        function deleteItem(id) { db.ref(`couples/${coupleID}/data/${period}/m/${id}`).remove(); }
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function toggleView(v) {
            document.getElementById('v-home').style.display = v === 'home' ? 'block' : 'none';
            document.getElementById('v-metas').style.display = v === 'metas' ? 'block' : 'none';
        }

        lucide.createIcons();
    </script>
</body>
</html>
