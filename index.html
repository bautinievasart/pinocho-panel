<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-API Scanner | ByBauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #F4F7FE; --card: #FFFFFF; --accent: #4318FF; --text: #2B3674; --green: #05CD99; --red: #EE5D50; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .card label { font-size: 12px; font-weight: 600; color: #A3AED0; text-transform: uppercase; }
        .card div { font-size: 24px; font-weight: 800; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        th { background: #FAFBFF; padding: 15px; text-align: left; font-size: 12px; color: #A3AED0; }
        td { padding: 15px; border-bottom: 1px solid #F4F7FE; font-weight: 700; }
        .badge { background: #F4F7FE; padding: 5px 10px; border-radius: 8px; font-size: 12px; color: var(--accent); }
        .up { color: var(--green); } .down { color: var(--red); }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Pinocho Scanner <small style="font-size: 12px; color: var(--accent);">V5 Multi-API</small></h1>
        <button class="btn" onclick="cambiarCapital()">Ajustar Capital</button>
    </div>

    <div class="grid">
        <div class="card"><label>Capital Disponible</label><div id="cap-display">$0</div></div>
        <div class="card"><label>Dólar MEP (Oficial)</label><div id="mep-display">$0</div></div>
        <div class="card"><label>Estado Red</label><div id="status" style="color: var(--green);">Conectado</div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ACTIVO</th>
                <th>PRECIO USD (Binance)</th>
                <th>PRECIO ARS (Est.)</th>
                <th>ESTADO</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <!-- Los datos se cargan aquí -->
        </tbody>
    </table>
</div>

<script>
    let CAPITAL = localStorage.getItem('b-cap') ? parseFloat(localStorage.getItem('b-cap')) : 500000;
    const COINS = [
        'BTCUSDT', 'ETHUSDT', 'BNBUSDT', 'SOLUSDT', 'ADAUSDT', 
        'XRPUSDT', 'TRXUSDT', 'DOGEUSDT', 'BCHUSDT', 'XLMUSDT', 
        'DOTUSDT', 'WBTCUSDT', 'DAIUSDT'
    ];

    async function updateData() {
        try {
            // 1. Obtener Dólar MEP de DolarAPI
            const resMep = await fetch('https://dolarapi.com/v1/dolares/bolsa');
            const dataMep = await resMep.json();
            const precioMep = dataMep.venta;
            document.getElementById('mep-display').innerText = `$${precioMep.toFixed(2)}`;
            document.getElementById('cap-display').innerText = `$${CAPITAL.toLocaleString()}`;

            // 2. Obtener precios de Binance (Directo y sin límites)
            const resBinance = await fetch('https://api.binance.com/api/v3/ticker/price');
            const prices = await resBinance.json();

            // 3. Obtener cotización de USDT en Argentina (Solo una llamada a CriptoYa)
            const resCy = await fetch('https://criptoya.com/api/usdt/ars/1');
            const dataCy = await resCy.json();
            const usdtArs = dataCy.lemoncash.ask; // Usamos Lemon como referencia base

            let html = "";

            // Filtrar y mostrar las monedas que pediste
            COINS.forEach(symbol => {
                const coinPrice = prices.find(p => p.symbol === symbol);
                if (coinPrice) {
                    const priceUsd = parseFloat(coinPrice.price);
                    const priceArs = priceUsd * usdtArs;
                    const name = symbol.replace('USDT', '');

                    html += `
                        <tr>
                            <td><span class="badge">${name}</span></td>
                            <td>U$D ${priceUsd < 1 ? priceUsd.toFixed(4) : priceUsd.toLocaleString()}</td>
                            <td>$${priceArs.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                            <td class="up">ACTIVO</td>
                        </tr>
                    `;
                }
            });

            document.getElementById('table-body').innerHTML = html;
            document.getElementById('status').innerText = "ACTUALIZADO";
            document.getElementById('status').style.color = "var(--green)";

        } catch (error) {
            console.error(error);
            document.getElementById('status').innerText = "ERROR DE CONEXIÓN";
            document.getElementById('status').style.color = "var(--red)";
        }
    }

    function cambiarCapital() {
        let p = prompt("Ingresá tu capital en ARS:", CAPITAL);
        if (p) {
            CAPITAL = parseFloat(p);
            localStorage.setItem('b-cap', CAPITAL);
            updateData();
        }
    }

    // Actualizar cada 10 segundos (Binance permite mucha frecuencia)
    setInterval(updateData, 10000);
    updateData();
</script>

</body>
</html>
