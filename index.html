<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly Pro | Bauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #f8fafc;
            --texto-oscuro: #0f172a;
            --texto-gris: #64748b;
            --blanco: #ffffff;
            --exito: #10b981;
            --error: #f43f5e;
            --gradiente-ingreso: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            --gradiente-gasto: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
            --gradiente-ahorro: linear-gradient(135deg, #6366f1 0%, #a5b4fc 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: #ced4da; display: flex; justify-content: center; }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--fondo);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.2);
            padding-bottom: 110px;
            overflow-x: hidden;
        }

        .vista { display: none; animation: fadeIn 0.3s ease; padding-bottom: 20px; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        .header-app {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
            color: white;
            padding: 45px 25px 90px 25px;
            border-bottom-left-radius: 45px;
            border-bottom-right-radius: 45px;
        }

        .perfil-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .usuario { display: flex; align-items: center; gap: 15px; }
        .avatar-real { 
            width: 50px; height: 50px; border-radius: 16px; 
            background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem;
        }

        .monto-balance { font-size: 3.2rem; font-weight: 800; margin-top: 5px; letter-spacing: -2px; }
        .cotizacion-api { font-size: 0.75rem; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; margin-top: 10px; }

        /* --- TARJETAS CON DEGRADADO DINÁMICO --- */
        .contenedor-grid { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
            margin-top: -50px;
        }

        .tarjeta-cat {
            background: var(--blanco);
            padding: 20px 10px;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.01);
        }
        .tarjeta-cat span { font-size: 0.75rem; color: var(--texto-gris); font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 8px; }
        
        /* Efecto Gradiente en Números */
        .num-gradiente {
            font-size: 1.15rem;
            font-weight: 800;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
        }
        .ingreso-txt { background-image: var(--gradiente-ingreso); }
        .gasto-txt { background-image: var(--gradiente-gasto); }
        .ahorro-txt { background-image: var(--gradiente-ahorro); }

        /* --- METAS --- */
        .tarjeta-meta { background: var(--blanco); border-radius: 24px; padding: 20px; margin-bottom: 15px; box-shadow: var(--sombra); }
        .barra-progreso { height: 12px; background: #f1f5f9; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .relleno-progreso { height: 100%; background: var(--primario); border-radius: 10px; transition: width 0.6s ease; }

        /* --- NAV --- */
        .nav-inferior {
            position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
            background: rgba(255, 255, 255, 0.98); border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px;
        }
        .nav-link { color: #cbd5e1; cursor: pointer; transition: 0.2s; padding: 10px; }
        .nav-link.activo { color: var(--primario); }
        
        .btn-mas { 
            width: 60px; height: 60px; background: var(--texto-oscuro); 
            border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            color: white; transform: translateY(-30px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: none; 
        }

        .widget { background: var(--blanco); border-radius: 28px; padding: 25px; margin-bottom: 25px; box-shadow: var(--sombra); }
        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #e2e8f0; margin-bottom: 15px; background: #f8fafc; font-size: 1rem; font-weight: 600; }
        .btn-pro { width: 100%; padding: 18px; background: var(--primario); color: white; border: none; border-radius: 18px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }

        #modal-registro { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.4); display:none; align-items:flex-end; z-index:2000; backdrop-filter: blur(4px); }
        .modal-contenido { background: var(--blanco); width:100%; padding:40px 25px; border-radius: 40px 40px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- VISTA INICIO -->
        <div id="vista-inicio" class="vista activa">
            <div class="header-app">
                <div class="perfil-nav">
                    <div class="usuario">
                        <div class="avatar-real" id="avatar-iniciales">B</div>
                        <div>
                            <p style="font-size: 0.8rem; opacity: 0.8; font-weight: 600;">Mi Patrimonio</p>
                            <p style="font-weight: 800; font-size: 1.1rem;" id="saludo-nombre">Hola, Bauti</p>
                        </div>
                    </div>
                    <button style="background:rgba(255,255,255,0.2); border:none; color:white; padding:10px; border-radius:12px;" onclick="navegar('vista-ajustes')">
                        <i data-lucide="settings" size="20"></i>
                    </button>
                </div>
                <p style="font-size: 0.9rem; opacity: 0.9; font-weight: 500;">Balance Total</p>
                <h1 class="monto-balance" id="balance-total">$0</h1>
                <div class="cotizacion-api" id="api-dolar">
                    <i data-lucide="refresh-cw" size="12"></i> Actualizando USD...
                </div>
            </div>

            <div class="contenedor-grid">
                <div class="tarjeta-cat">
                    <span>Ingresos</span>
                    <strong class="num-gradiente ingreso-txt" id="resumen-ingresos">$0</strong>
                </div>
                <div class="tarjeta-cat">
                    <span>Gastos</span>
                    <strong class="num-gradiente gasto-txt" id="resumen-gastos">$0</strong>
                </div>
                <div class="tarjeta-cat">
                    <span>Ahorro</span>
                    <strong class="num-gradiente ahorro-txt" id="resumen-ahorro-neto">$0</strong>
                </div>
            </div>

            <div style="padding: 30px 20px;">
                <h3 class="titulo-seccion">Rendimiento Mensual</h3>
                <div class="widget">
                    <canvas id="graficoFlujo" height="180"></canvas>
                </div>
                <h3 class="titulo-seccion">Últimos Movimientos</h3>
                <div id="lista-movimientos-inicio"></div>
            </div>
        </div>

        <!-- VISTA METAS (REACTIVADA) -->
        <div id="vista-metas" class="vista">
            <div style="padding: 40px 25px;">
                <h1 style="font-weight: 800; font-size: 1.8rem; margin-bottom: 5px;">Mis Metas</h1>
                <p style="color: var(--texto-gris); margin-bottom: 25px;">Calculadora de ahorro automática.</p>
                
                <div class="widget">
                    <input type="text" id="meta-nombre" placeholder="¿Para qué ahorramos?">
                    <input type="number" id="meta-monto" placeholder="Objetivo total $">
                    <input type="number" id="meta-mensual" placeholder="Ahorro mensual extra $">
                    <button class="btn-pro" onclick="crearMeta()">Establecer Meta</button>
                </div>

                <div id="lista-metas"></div>
            </div>
        </div>

        <!-- VISTA AJUSTES -->
        <div id="vista-ajustes" class="vista">
            <div style="padding: 40px 25px;">
                <h2 class="titulo-seccion">Configuración</h2>
                <div class="widget">
                    <input type="text" id="config-nombre" placeholder="Tu nombre">
                    <button class="btn-pro" onclick="guardarConfiguracion()">Actualizar Perfil</button>
                </div>
                <button onclick="resetearDatos()" style="color: var(--error); background: none; border: none; font-weight: 800; width: 100%; margin-top: 20px;">RESTABLECER TODOS LOS DATOS</button>
            </div>
        </div>

        <!-- NAVEGACIÓN -->
        <div class="nav-inferior">
            <div class="nav-link activo" onclick="navegar('vista-inicio', this)"><i data-lucide="home"></i></div>
            <div class="nav-link" onclick="navegar('vista-metas', this)"><i data-lucide="target"></i></div>
            <button class="btn-mas" onclick="abrirModal()"><i data-lucide="plus" size="28"></i></button>
            <div class="nav-link"><i data-lucide="bar-chart-3"></i></div>
            <div class="nav-link" onclick="navegar('vista-ajustes', this)"><i data-lucide="user"></i></div>
        </div>

        <!-- MODAL -->
        <div id="modal-registro" onclick="if(event.target == this) cerrarModal()">
            <div class="modal-contenido">
                <div style="width: 40px; height: 6px; background: #e2e8f0; border-radius: 10px; margin: -20px auto 30px auto;"></div>
                <h3 style="margin-bottom: 25px; font-weight: 800; font-size: 1.5rem;">Nuevo Registro</h3>
                <input type="text" id="reg-desc" placeholder="Descripción">
                <input type="number" id="reg-monto" placeholder="Monto $">
                <select id="reg-tipo">
                    <option value="egreso">Gasto (-)</option>
                    <option value="ingreso">Ingreso (+)</option>
                </select>
                <button class="btn-pro" onclick="registrarMovimiento()">Guardar Cambios</button>
            </div>
        </div>

    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('finanzly_v3')) || { 
            usuario: { nombre: 'Bauti', iniciales: 'B' }, 
            movimientos: [],
            metas: []
        };

        // --- API DE MONEDA (FUNCIONALIDAD PRO) ---
        async function obtenerDolar() {
            try {
                // Usamos una API gratuita de tipos de cambio
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const rate = data.rates.ARS || 900; // Backup si falla
                window.precioDolar = rate;
                actualizarConversionDolar();
            } catch(e) {
                document.getElementById('api-dolar').innerHTML = "Modo Offline";
            }
        }

        function actualizarConversionDolar() {
            const totalArs = calcularBalance();
            const totalUsd = (totalArs / (window.precioDolar || 900)).toFixed(2);
            document.getElementById('api-dolar').innerHTML = `<i data-lucide="globe" size="12"></i> Equivale a U$D ${totalUsd}`;
            lucide.createIcons();
        }

        function calcularBalance() {
            return db.movimientos.reduce((acc, m) => m.tipo === 'ingreso' ? acc + m.monto : acc - m.monto, 0);
        }

        // --- LÓGICA DE VISTAS ---
        function navegar(id, el) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('activo'));
            document.getElementById(id).classList.add('activa');
            if(el) el.classList.add('activo');
            if(id === 'vista-inicio') renderGrafico();
        }

        function abrirModal() { document.getElementById('modal-registro').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-registro').style.display = 'none'; }

        // --- ACCIONES ---
        function registrarMovimiento() {
            const desc = document.getElementById('reg-desc').value;
            const monto = parseFloat(document.getElementById('reg-monto').value);
            const tipo = document.getElementById('reg-tipo').value;
            if(!desc || !monto) return;
            db.movimientos.unshift({ id: Date.now(), desc, monto, tipo, fecha: new Date().toLocaleDateString('es-AR', {day:'2-digit', month:'short'}) });
            guardarYRefrescar();
            cerrarModal();
        }

        function crearMeta() {
            const nombre = document.getElementById('meta-nombre').value;
            const monto = parseFloat(document.getElementById('meta-monto').value);
            const mensual = parseFloat(document.getElementById('meta-mensual').value);
            if(!nombre || !monto) return;
            db.metas.push({ id: Date.now(), nombre, monto, mensual });
            guardarYRefrescar();
            document.getElementById('meta-nombre').value = '';
            document.getElementById('meta-monto').value = '';
        }

        function borrarMeta(id) {
            db.metas = db.metas.filter(m => m.id !== id);
            guardarYRefrescar();
        }

        function guardarYRefrescar() {
            localStorage.setItem('finanzly_v3', JSON.stringify(db));
            actualizarUI();
        }

        function actualizarUI() {
            document.getElementById('saludo-nombre').innerText = `Hola, ${db.usuario.nombre}`;
            document.getElementById('avatar-iniciales').innerText = db.usuario.nombre[0].toUpperCase();

            let total = calcularBalance();
            let ing = db.movimientos.filter(m => m.tipo === 'ingreso').reduce((a, b) => a + b.monto, 0);
            let egr = db.movimientos.filter(m => m.tipo === 'egreso').reduce((a, b) => a + b.monto, 0);

            document.getElementById('balance-total').innerText = `$${total.toLocaleString('es-AR')}`;
            document.getElementById('resumen-ingresos').innerText = `$${ing.toLocaleString('es-AR')}`;
            document.getElementById('resumen-gastos').innerText = `$${egr.toLocaleString('es-AR')}`;
            document.getElementById('resumen-ahorro-neto').innerText = `$${(ing - egr).toLocaleString('es-AR')}`;

            // Movimientos
            const lista = document.getElementById('lista-movimientos-inicio');
            lista.innerHTML = db.movimientos.slice(0, 4).map(m => `
                <div class="item-movimiento">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="icono-mov" style="background:${m.tipo === 'ingreso' ? '#dcfce7':'#fee2e2'}; color:${m.tipo === 'ingreso' ? 'var(--exito)':'var(--error)'}">
                            <i data-lucide="${m.tipo === 'ingreso' ? 'trending-up' : 'shopping-cart'}" size="18"></i>
                        </div>
                        <div class="info-mov">
                            <p>${m.desc}</p>
                            <span>${m.fecha}</span>
                        </div>
                    </div>
                    <strong style="font-weight:800;">${m.tipo === 'ingreso' ? '+' : '-'}$${m.monto.toLocaleString()}</strong>
                </div>
            `).join('');

            // Metas
            const lMetas = document.getElementById('lista-metas');
            lMetas.innerHTML = db.metas.map(meta => {
                const progreso = Math.min(100, (total / meta.monto) * 100).toFixed(0);
                const meses = meta.mensual > 0 ? Math.ceil((meta.monto - total) / meta.mensual) : 'N/A';
                return `
                    <div class="tarjeta-meta">
                        <div style="display:flex; justify-content:space-between; align-items:start;">
                            <strong style="font-size:1.1rem;">${meta.nombre}</strong>
                            <button onclick="borrarMeta(${meta.id})" style="border:none; background:none; color:var(--error); font-weight:800;">×</button>
                        </div>
                        <p style="font-size:0.8rem; color:var(--texto-gris); margin-top:5px;">Objetivo: $${meta.monto.toLocaleString()}</p>
                        <div class="barra-progreso"><div class="relleno-progreso" style="width:${progreso}%"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-weight:700;">
                            <span style="color:var(--primario)">${progreso}% completado</span>
                            <span style="color:var(--texto-gris)">${progreso >= 100 ? '¡Logrado!' : `Faltan ~${meses} meses`}</span>
                        </div>
                    </div>
                `;
            }).join('');

            obtenerDolar();
            renderGrafico();
            lucide.createIcons();
        }

        function renderGrafico() {
            const ctx = document.getElementById('graficoFlujo').getContext('2d');
            if(window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['S1', 'S2', 'S3', 'S4'],
                    datasets: [{
                        data: [totalXSemana(3), totalXSemana(2), totalXSemana(1), totalXSemana(0)],
                        borderColor: '#6366f1', borderWidth: 4, pointRadius: 5, pointBackgroundColor: '#fff', tension: 0.4, fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.05)'
                    }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { display: false } } }
            });
        }

        function totalXSemana(offset) { return 400 + (offset * 150); } // Simulación

        function guardarConfiguracion() {
            const n = document.getElementById('config-nombre').value;
            if(n) { db.usuario.nombre = n; guardarYRefrescar(); alert("Perfil Actualizado"); }
        }

        function resetearDatos() { if(confirm("¿Seguro? Se borrará todo.")) { localStorage.clear(); location.reload(); } }

        actualizarUI();
    </script>
</body>
</html>
