<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Pro Couple</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --primary: #4f46e5; --text: #0f172a;
            --secondary: #64748b; --white: #ffffff; --success: #10b981; --error: #ef4444;
        }

        /* ANIMACIONES */
        @keyframes dynamicGlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes textGlowSuccess { 0% { color: #10b981; } 50% { color: #34d399; } 100% { color: #10b981; } }
        @keyframes textGlowError { 0% { color: #ef4444; } 50% { color: #f87171; } 100% { color: #ef4444; } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        /* HEADER */
        .header {
            background: linear-gradient(-45deg, #4f46e5, #9333ea, #2563eb, #06b6d4);
            background-size: 300% 300%;
            animation: dynamicGlow 6s ease infinite;
            padding: 60px 24px 40px;
            border-radius: 0 0 50px 50px;
            text-align: center; color: white; flex-shrink: 0;
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.15);
        }
        .month-selector { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 15px; border-radius: 12px; font-weight: 700; margin-bottom: 10px; outline: none; }
        .balance-value { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; }

        /* CONTENIDO */
        .content { flex: 1; overflow-y: auto; padding: 0 20px 120px; margin-top: 20px; }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: -40px; margin-bottom: 25px; position: relative; z-index: 10; }
        .card { background: white; padding: 22px; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); text-align: center; }
        .val-ing { font-size: 1.4rem; font-weight: 800; animation: textGlowSuccess 3s infinite; }
        .val-egr { font-size: 1.4rem; font-weight: 800; animation: textGlowError 3s infinite; }

        /* VISTAS */
        .view { display: none; }
        .view.active { display: block; }

        /* MOVIMIENTOS CON ANIMACIÓN AL SCROLL */
        .mov-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; padding: 18px; margin-bottom: 12px;
            border-radius: 24px; transition: 0.4s ease;
            transform: translateY(10px); opacity: 0.9;
        }
        .btn-delete { background: #fee2e2; color: var(--error); border: none; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }

        /* METAS */
        .goal-card { background: white; padding: 25px; border-radius: 30px; margin-bottom: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.02); }
        .progress-bar { width: 100%; height: 10px; background: #f1f5f9; border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #9333ea); transition: width 1s ease; }

        /* NAV BAR */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 90px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; border-top: 1px solid #f1f5f9; z-index: 100;
        }
        .nav-item { color: #cbd5e1; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; font-weight: 800; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .btn-plus { width: 65px; height: 65px; background: var(--text); color: white; border: none; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-20px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; z-index: 200; backdrop-filter: blur(5px); }
        .modal-body { background: white; width: 100%; padding: 35px; border-radius: 40px 40px 0 0; animation: slideUp 0.3s ease; }
        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #f1f5f9; background: #f8fafc; margin-bottom: 12px; font-weight: 700; outline: none; }
        .btn-confirm { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <select class="month-selector" id="month-picker" onchange="changePeriod(this.value)"></select>
            <p style="font-size:0.75rem; font-weight:800; letter-spacing:2px; opacity:0.8">DISPONIBLE</p>
            <h1 class="balance-value" id="dom-balance">$0</h1>
        </div>

        <div class="content">
            <div class="summary-grid">
                <div class="card"><span>INGRESOS</span><p class="val-ing" id="dom-ing">+$0</p></div>
                <div class="card"><span>GASTOS</span><p class="val-egr" id="dom-egr">-$0</p></div>
            </div>

            <div id="v-home" class="view active">
                <div style="background:white; padding:20px; border-radius:30px; margin-bottom:25px;"><canvas id="lineChart" height="120"></canvas></div>
                <p style="font-weight:800; margin-bottom:15px">Movimientos</p>
                <div id="dom-list"></div>
            </div>

            <div id="v-goals" class="view">
                <p style="font-weight:800; margin-bottom:15px">Nuestras Metas</p>
                <div class="card" style="text-align:left; padding:25px; margin-bottom:25px;">
                    <input type="text" id="g-name" placeholder="Nombre (ej: Vacaciones)">
                    <input type="number" id="g-amount" placeholder="Monto objetivo">
                    <button class="btn-confirm" onclick="saveGoal()">Crear Meta</button>
                </div>
                <div id="dom-goals-list"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('v-home', this)"><i data-lucide="home"></i>INICIO</div>
            <button class="btn-plus" onclick="openM()"><i data-lucide="plus" size="32"></i></button>
            <div class="nav-item" onclick="switchTab('v-goals', this)"><i data-lucide="target"></i>METAS</div>
        </nav>
    </div>

    <div id="modal" onclick="if(event.target==this) closeM()">
        <div class="modal-body">
            <h3 style="margin-bottom:20px; font-weight:800">Nuevo Movimiento</h3>
            <input type="text" id="m-desc" placeholder="Descripción">
            <input type="number" id="m-amount" placeholder="Monto">
            <select id="m-type">
                <option value="out">Gasto (-)</option>
                <option value="in">Ingreso (+)</option>
            </select>
            <button class="btn-confirm" onclick="saveData()">Guardar Registro</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE (Rellena esto para que sincronice con tu pareja)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let coupleID = localStorage.getItem('fz_coupleID') || 'pareja_demo';
        let currentPeriod = new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' });

        function init() {
            database.ref('couples/' + coupleID).on('value', (snap) => {
                window.db = snap.val() || { data: {}, g: [] };
                updateUI();
            });
        }

        function saveData() {
            const d = document.getElementById('m-desc').value, a = parseFloat(document.getElementById('m-amount').value), t = document.getElementById('m-type').value;
            if(!d || isNaN(a)) return;
            if(!window.db.data) window.db.data = {};
            if(!window.db.data[currentPeriod]) window.db.data[currentPeriod] = { m: [] };
            
            window.db.data[currentPeriod].m.unshift({ id: Date.now(), d, a, t, date: new Date().toLocaleDateString() });
            database.ref('couples/' + coupleID).set(window.db);
            closeM();
            document.getElementById('m-desc').value = ''; document.getElementById('m-amount').value = '';
        }

        function saveGoal() {
            const n = document.getElementById('g-name').value, a = parseFloat(document.getElementById('g-amount').value);
            if(!n || isNaN(a)) return;
            if(!window.db.g) window.db.g = [];
            window.db.g.unshift({ id: Date.now(), n, a });
            database.ref('couples/' + coupleID).set(window.db);
            document.getElementById('g-name').value = ''; document.getElementById('g-amount').value = '';
        }

        function deleteItem(id) {
            window.db.data[currentPeriod].m = window.db.data[currentPeriod].m.filter(x => x.id !== id);
            database.ref('couples/' + coupleID).set(window.db);
        }

        function deleteGoal(id) {
            window.db.g = window.db.g.filter(x => x.id !== id);
            database.ref('couples/' + coupleID).set(window.db);
        }

        function updateUI() {
            let i = 0, e = 0, mHtml = '';
            const movements = window.db.data?.[currentPeriod]?.m || [];
            
            movements.forEach(x => {
                const isI = x.t === 'in';
                if(isI) i += x.a; else e += x.a;
                mHtml += `<div class="mov-item">
                    <div style="display:flex; align-items:center;">
                        <div style="width:45px; height:45px; border-radius:14px; background:${isI?'#dcfce7':'#fee2e2'}; color:${isI?'#10b981':'#ef4444'}; display:flex; align-items:center; justify-content:center; margin-right:12px;"><i data-lucide="${isI?'arrow-up':'shopping-bag'}" size="20"></i></div>
                        <div><b style="font-size:0.95rem">${x.d}</b><br><small style="color:var(--secondary)">${x.date}</small></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <b style="font-size:1.1rem">${isI?'+':'-'}$${x.a.toLocaleString()}</b>
                        <button class="btn-delete" onclick="deleteItem(${x.id})"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>`;
            });

            const balance = i - e;
            document.getElementById('dom-balance').innerText = `$${balance.toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${i.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${e.toLocaleString()}`;
            document.getElementById('dom-list').innerHTML = mHtml || '<p style="text-align:center; opacity:0.5; padding:40px;">Sin registros</p>';

            // Render Metas
            let gHtml = '';
            (window.db.g || []).forEach(x => {
                let perc = Math.min((balance / x.a) * 100, 100);
                gHtml += `<div class="goal-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><b>${x.n}</b><button onclick="deleteGoal(${x.id})" style="border:none; background:none; color:red">X</button></div>
                    <div style="display:flex; justify-content:space-between; font-size:0.8rem; color:var(--secondary)"><span>$${balance.toLocaleString()} ahorrados</span><span>Meta: $${x.a.toLocaleString()}</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
                </div>`;
            });
            document.getElementById('dom-goals-list').innerHTML = gHtml;

            // Selector de meses
            const periods = window.db.data ? Object.keys(window.db.data) : [currentPeriod];
            if(!periods.includes(currentPeriod)) periods.push(currentPeriod);
            document.getElementById('month-picker').innerHTML = periods.map(p => `<option value="${p}" ${p===currentPeriod?'selected':''}>${p.toUpperCase()}</option>`).join('');

            renderChart(movements);
            lucide.createIcons();
        }

        function renderChart(movements) {
            const ctx = document.getElementById('lineChart').getContext('2d');
            let b = 0; const pts = [...movements].reverse().map(x => { b += (x.t === 'in' ? x.a : -x.a); return b; });
            if(window.lc) window.lc.destroy();
            window.lc = new Chart(ctx, {
                type: 'line',
                data: { labels: pts.map(()=>''), datasets: [{ data: pts, borderColor: '#4f46e5', borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function changePeriod(p) { currentPeriod = p; updateUI(); }
        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        init();
    </script>
</body>
</html>
