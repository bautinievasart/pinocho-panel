<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Full Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8fafc; --primary: #4f46e5; --text: #1e293b;
            --secondary: #64748b; --white: #ffffff; --success: #10b981;
            --error: #ef4444; --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; /* Evita rebotes raros en el scroll general */
        }

        .app-shell {
            width: 100vw; /* Ocupa todo el ancho de la ventana */
            height: 100dvh; /* Ocupa todo el alto dinámico */
            background: var(--bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- HEADER --- */
        .header {
            background: var(--primary);
            color: white;
            padding: 50px 24px 70px;
            border-radius: 0 0 40px 40px;
            flex-shrink: 0;
            text-align: center;
        }
        .balance-label { font-size: 0.8rem; opacity: 0.8; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 3.2rem; font-weight: 800; letter-spacing: -2px; margin-top: 8px; }

        /* --- CONTENT AREA --- */
        .content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 20px 120px;
            margin-top: -40px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--white);
            padding: 20px 15px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .card span { font-size: 0.7rem; color: var(--secondary); font-weight: 800; text-transform: uppercase; }
        .card p { font-size: 1.2rem; font-weight: 800; margin-top: 6px; }

        /* --- VISTAS --- */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- ITEMS --- */
        .mov-item, .goal-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--white);
            padding: 16px;
            border-radius: 22px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        /* --- NAV BAR --- */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 20px;
            z-index: 50;
        }
        .nav-item { color: #cbd5e1; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.65rem; font-weight: 700; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .btn-plus {
            width: 62px; height: 62px;
            background: var(--text);
            color: white; border: none; border-radius: 22px;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(-28px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        /* --- MODAL --- */
        #modal {
            position: fixed; inset: 0;
            background: rgba(15, 23, 42, 0.7);
            display: none; flex-direction: column; justify-content: flex-end;
            z-index: 100;
        }
        .modal-body {
            background: var(--white);
            width: 100%;
            padding: 35px 25px;
            border-radius: 40px 40px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
        }
        input, select { 
            width: 100%; padding: 18px; border-radius: 18px; 
            border: 1px solid #e2e8f0; background: #f8fafc;
            margin-bottom: 15px; font-size: 1rem; font-weight: 600; outline: none; 
        }
        .btn-confirm { 
            width: 100%; padding: 20px; background: var(--primary); 
            color: white; border: none; border-radius: 18px; 
            font-weight: 800; font-size: 1.1rem;
        }

        /* --- PROGRESS --- */
        .progress-bg { width: 100%; height: 10px; background: #f1f5f9; border-radius: 20px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--success); transition: 0.8s cubic-bezier(0.17, 0.67, 0.83, 0.67); }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <p class="balance-label">Balance Disponible</p>
            <h1 class="balance-value" id="dom-balance">$0</h1>
        </div>

        <div class="content">
            <div class="summary-grid">
                <div class="card"><span>Ingresos</span><p style="color:var(--success)" id="dom-ing">+$0</p></div>
                <div class="card"><span>Gastos</span><p style="color:var(--error)" id="dom-egr">-$0</p></div>
            </div>

            <!-- HOME -->
            <div id="v-home" class="view active">
                <div style="background:white; padding:20px; border-radius:30px; margin-bottom:25px; box-shadow: var(--shadow);">
                    <canvas id="lineChart" height="150"></canvas>
                </div>
                <p style="font-weight:800; margin-bottom:15px; color: var(--secondary);">MOVIMIENTOS RECIENTES</p>
                <div id="dom-list"></div>
            </div>

            <!-- METAS -->
            <div id="v-goals" class="view">
                <p style="font-weight:800; margin-bottom:15px;">NUEVO OBJETIVO</p>
                <div class="card" style="margin-bottom:30px; text-align: left;">
                    <input type="text" id="g-name" placeholder="¿Para qué ahorrás?">
                    <input type="number" id="g-amount" placeholder="Monto objetivo ($)">
                    <button class="btn-confirm" onclick="saveGoal()">Crear Meta</button>
                </div>
                <p style="font-weight:800; margin-bottom:15px;">MIS METAS</p>
                <div id="dom-goals-list"></div>
            </div>

            <!-- STATS -->
            <div id="v-stats" class="view">
                <p style="font-weight:800; margin-bottom:15px;">CATEGORÍAS DE GASTO</p>
                <div class="card" style="padding: 30px 10px;"><canvas id="pieChart" height="300"></canvas></div>
            </div>
        </div>

        <!-- NAV BAR -->
        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('v-home', this)"><i data-lucide="home"></i>INICIO</div>
            <div class="nav-item" onclick="switchTab('v-goals', this)"><i data-lucide="target"></i>METAS</div>
            <button class="btn-plus" onclick="openM()"><i data-lucide="plus" size="32"></i></button>
            <div class="nav-item" onclick="switchTab('v-stats', this)"><i data-lucide="pie-chart"></i>STATS</div>
            <div class="nav-item"><i data-lucide="user"></i>PERFIL</div>
        </nav>

        <!-- MODAL -->
        <div id="modal" onclick="if(event.target==this) closeM()">
            <div class="modal-body">
                <h3 style="margin-bottom:25px; font-weight: 800; font-size: 1.4rem;">Nuevo Registro</h3>
                <input type="text" id="m-desc" placeholder="Descripción (Ej: Cena)">
                <input type="number" id="m-amount" placeholder="Monto ($)" step="any" inputmode="decimal">
                <select id="m-type">
                    <option value="out">Gasto (-)</option>
                    <option value="in">Ingreso (+)</option>
                </select>
                <button class="btn-confirm" onclick="saveData()">Confirmar Ahora</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fz_v11')) || { m: [], g: [] };

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'v-home') renderLine();
            if(id === 'v-stats') renderPie();
            lucide.createIcons();
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function saveData() {
            const d = document.getElementById('m-desc').value, a = parseFloat(document.getElementById('m-amount').value), t = document.getElementById('m-type').value;
            if(!d || isNaN(a)) return;
            db.m.unshift({ id: Date.now(), d, a, t, date: new Date().toLocaleDateString() });
            saveAndRefresh();
            closeM();
            document.getElementById('m-desc').value = ''; document.getElementById('m-amount').value = '';
        }

        function saveGoal() {
            const n = document.getElementById('g-name').value, a = parseFloat(document.getElementById('g-amount').value);
            if(!n || isNaN(a)) return;
            db.g.unshift({ id: Date.now(), n, a });
            saveAndRefresh();
            document.getElementById('g-name').value = ''; document.getElementById('g-amount').value = '';
        }

        function deleteMov(id) { db.m = db.m.filter(x => x.id !== id); saveAndRefresh(); }
        function deleteGoal(id) { db.g = db.g.filter(x => x.id !== id); saveAndRefresh(); }

        function saveAndRefresh() {
            localStorage.setItem('fz_v11', JSON.stringify(db));
            updateUI();
        }

        function updateUI() {
            let i = 0, e = 0, mHtml = '', gHtml = '';
            db.m.forEach(x => {
                const isI = x.t === 'in';
                if(isI) i += x.a; else e += x.a;
                mHtml += `<div class="mov-item">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div style="width:40px; height:40px; border-radius:12px; background:${isI?'#dcfce7':'#fee2e2'}; color:${isI?'#10b981':'#ef4444'}; display:flex; align-items:center; justify-content:center;">
                                    <i data-lucide="${isI?'arrow-up':'shopping-bag'}" size="18"></i>
                                </div>
                                <div><b style="font-size:0.95rem;">${x.d}</b><br><small style="color:var(--secondary)">${x.date}</small></div>
                            </div>
                            <div style="display:flex;align-items:center;gap:12px;">
                                <b style="color:${isI?'var(--success)':'var(--text)'}; font-size:1.1rem;">${isI?'+':'-'}$${x.a.toLocaleString()}</b>
                                <i data-lucide="x" size="16" onclick="deleteMov(${x.id})" style="cursor:pointer;color:#cbd5e1"></i>
                            </div>
                         </div>`;
            });

            const balance = i - e;
            db.g.forEach(x => {
                let perc = Math.min((balance / x.a) * 100, 100);
                if(balance <= 0) perc = 0;
                gHtml += `<div class="goal-item" style="flex-direction:column;align-items:flex-start;gap:8px;">
                            <div style="display:flex;justify-content:space-between;width:100%">
                                <b style="font-size:1.1rem;">${x.n}</b>
                                <i data-lucide="trash-2" size="16" onclick="deleteGoal(${x.id})" style="color:#cbd5e1; cursor:pointer;"></i>
                            </div>
                            <div style="display:flex; justify-content:space-between; width:100%; font-size:0.85rem; font-weight:600; color:var(--secondary);">
                                <span>$${balance.toLocaleString()} ahorrados</span>
                                <span>Meta:$${x.a.toLocaleString()}</span>
                            </div>
                            <div class="progress-bg"><div class="progress-fill" style="width:${perc}%"></div></div>
                          </div>`;
            });

            document.getElementById('dom-balance').innerText = `$${balance.toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${i.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${e.toLocaleString()}`;
            document.getElementById('dom-list').innerHTML = mHtml || '<p style="text-align:center; color:#94a3b8; padding:20px;">Sin movimientos</p>';
            document.getElementById('dom-goals-list').innerHTML = gHtml || '<p style="text-align:center; color:#94a3b8; padding:20px;">Sin metas activas</p>';
            renderLine();
            lucide.createIcons();
        }

        function renderLine() {
            const ctx = document.getElementById('lineChart').getContext('2d');
            let b = 0; const pts = [...db.m].reverse().map(x => { b += (x.t === 'in' ? x.a : -x.a); return b; });
            if(window.lc) window.lc.destroy();
            window.lc = new Chart(ctx, { type: 'line', data: { labels: pts.map(()=>''), datasets: [{ data: pts, borderColor: '#4f46e5', borderWidth: 4, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.08)' }] }, options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} } });
        }

        function renderPie() {
            const ctx = document.getElementById('pieChart').getContext('2d');
            const gs = db.m.filter(x => x.t === 'out');
            const dataMap = {}; gs.forEach(x => dataMap[x.d] = (dataMap[x.d] || 0) + x.a);
            if(window.pc) window.pc.destroy();
            window.pc = new Chart(ctx, { type: 'doughnut', data: { labels: Object.keys(dataMap), datasets: [{ data: Object.values(dataMap), backgroundColor: ['#4f46e5', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#06b6d4'], borderWidth: 0 }] }, options: { cutout: '80%', plugins:{legend:{position:'bottom', labels:{padding:20, font:{size:14, weight:600}}}} } });
        }

        updateUI();
    </script>
</body>
</html>
