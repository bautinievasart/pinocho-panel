<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f1f5f9; --primary: #6366f1; --text: #0f172a;
            --white: #ffffff; --success: #10b981; --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER REDISEÑADO */
        .header {
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            padding: 50px 20px 30px;
            color: white;
            text-align: center;
            border-radius: 0 0 30px 30px;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
            z-index: 10;
        }
        .balance-val { font-size: 3rem; font-weight: 800; margin: 5px 0; letter-spacing: -2px; }

        /* CONTENEDOR DE TARJETAS (EVITA EL DESASTRE VISUAL) */
        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stats-card {
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            text-align: center;
        }

        .stats-label { font-size: 0.65rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .stats-num { font-size: 1.2rem; font-weight: 800; }
        .num-in { color: var(--success); }
        .num-out { color: var(--error); }

        /* LISTA DE MOVIMIENTOS */
        .list-container { background: var(--white); border-radius: 24px; padding: 20px; min-height: 200px; }
        .item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 15px 0; border-bottom: 1px solid #f1f5f9;
        }

        /* NAVEGACIÓN */
        .nav {
            background: var(--white); height: 85px; display: flex; 
            justify-content: space-around; align-items: center;
            border-top: 1px solid #e2e8f0; padding-bottom: 15px;
        }
        .add-btn {
            width: 60px; height: 60px; background: var(--text); color: white;
            border: none; border-radius: 20px; margin-top: -40px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        /* MODAL */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: flex-end; z-index: 100;
        }
        .modal-content { 
            background: white; width: 100%; padding: 30px; 
            border-radius: 30px 30px 0 0; 
        }
        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; 
            border-radius: 12px; border: 1px solid #e2e8f0; font-size: 1rem;
        }
        .save-btn { 
            width: 100%; padding: 15px; background: var(--primary); 
            color: white; border: none; border-radius: 12px; font-weight: 800;
        }
    </style>
</head>
<body>

    <div class="header">
        <span style="font-size: 0.8rem; font-weight: 700; opacity: 0.8;">DISPONIBLE TOTAL</span>
        <div class="balance-val" id="dom-bal">$0</div>
    </div>

    <div class="main-container">
        <div class="summary-row">
            <div class="stats-card">
                <span class="stats-label">Ingresos</span>
                <div class="stats-num num-in" id="dom-in">+$0</div>
            </div>
            <div class="stats-card">
                <span class="stats-label">Gastos</span>
                <div class="stats-num num-out" id="dom-out">-$0</div>
            </div>
        </div>

        <div id="v-home" class="view">
            <div class="list-container">
                <h4 style="margin-bottom: 15px; font-weight: 800;">Actividad</h4>
                <div id="dom-list"></div>
            </div>
        </div>

        <div id="v-metas" class="view" style="display:none;">
            <div class="list-container">
                <h4 style="margin-bottom: 15px; font-weight: 800;">Metas</h4>
                <div id="dom-metas"></div>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div onclick="showView('v-home')"><i data-lucide="home"></i></div>
        <button class="add-btn" onclick="openModal()"><i data-lucide="plus"></i></button>
        <div onclick="showView('v-metas')"><i data-lucide="target"></i></div>
    </nav>

    <div id="modal" onclick="if(event.target==this) closeModal()">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Nuevo Movimiento</h3>
            <input type="text" id="m-desc" placeholder="¿Qué es? (Ej: Supermercado)">
            <input type="number" id="m-amount" placeholder="Monto ($)">
            <select id="m-type">
                <option value="out">Gasto</option>
                <option value="in">Ingreso</option>
            </select>
            <button class="save-btn" onclick="actionSave()">Guardar Registro</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const coupleID = "nuestra_cuenta_123"; 
        const period = new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' });

        // --- LÓGICA DE DATOS ---
        function actionSave() {
            const desc = document.getElementById('m-desc').value;
            const amount = parseFloat(document.getElementById('m-amount').value);
            const type = document.getElementById('m-type').value;

            if (!desc || isNaN(amount)) {
                alert("Por favor completa los datos");
                return;
            }

            const newRef = db.ref(`couples/${coupleID}/data/${period}/m`).push();
            newRef.set({
                desc, amount, type, 
                date: new Date().toLocaleDateString(),
                ts: Date.now()
            }).then(() => {
                closeModal();
                document.getElementById('m-desc').value = '';
                document.getElementById('m-amount').value = '';
            }).catch(err => alert("Error: " + err.message));
        }

        function updateDashboard() {
            db.ref(`couples/${coupleID}/data/${period}/m`).on('value', (snap) => {
                let tin = 0, tout = 0, html = '';
                const data = snap.val();
                
                if (data) {
                    Object.values(data).reverse().forEach(x => {
                        const isIn = x.type === 'in';
                        if (isIn) tin += x.amount; else tout += x.amount;
                        
                        html += `
                        <div class="item">
                            <div>
                                <strong>${x.desc}</strong><br>
                                <small style="color:gray">${x.date}</small>
                            </div>
                            <span style="font-weight:800; color:${isIn? 'var(--success)':'var(--text)'}">
                                ${isIn?'+':'-'}$${x.amount.toLocaleString()}
                            </span>
                        </div>`;
                    });
                }

                document.getElementById('dom-bal').innerText = `$${(tin - tout).toLocaleString()}`;
                document.getElementById('dom-in').innerText = `+$${tin.toLocaleString()}`;
                document.getElementById('dom-out').innerText = `-$${tout.toLocaleString()}`;
                document.getElementById('dom-list').innerHTML = html || '<p style="color:gray; text-align:center; padding:20px;">No hay movimientos</p>';
                lucide.createIcons();
            });
        }

        // --- UI HELPER ---
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        // --- INIT ---
        updateDashboard();
        lucide.createIcons();
    </script>
</body>
</html>
