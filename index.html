<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Final Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #fdfeff; --primary: #4f46e5; --text: #0f172a;
            --secondary: #64748b; --white: #ffffff; --success: #10b981;
            --error: #ef4444; 
        }

        @keyframes dynamicGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow: hidden; }
        .app-shell { width: 100vw; height: 100dvh; display: flex; flex-direction: column; position: relative; }

        /* HEADER + BALANCE REDUCIDO */
        .header {
            background: linear-gradient(-45deg, #4f46e5, #9333ea, #2563eb, #06b6d4);
            background-size: 300% 300%;
            animation: dynamicGlow 6s ease infinite;
            padding: 70px 24px 70px;
            border-radius: 0 0 60px 60px;
            flex-shrink: 0; text-align: center; z-index: 10;
            box-shadow: 0 20px 40px rgba(79, 70, 229, 0.15);
            transition: transform 0.1s linear, opacity 0.1s linear;
            will-change: transform, opacity;
        }

        .balance-label { font-size: 0.8rem; opacity: 0.8; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: white; margin-bottom: 8px; }
        
        /* TAMAÑO AJUSTADO AQUÍ */
        .balance-value { 
            font-size: 3.8rem; 
            font-weight: 800; 
            letter-spacing: -2px; 
            color: white; 
            text-shadow: 0 10px 30px rgba(255,255,255,0.2); 
        }

        .content {
            flex-grow: 1; overflow-y: scroll; padding: 40px 0 160px; position: relative; z-index: 20;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; padding: 0 24px; margin-bottom: 40px; }
        .card { background: var(--white); padding: 25px 15px; border-radius: 32px; box-shadow: 0 15px 35px rgba(0,0,0,0.06); text-align: center; position: relative; }
        .card span { font-size: 0.75rem; font-weight: 800; color: var(--secondary); display: block; margin-bottom: 8px; }
        .card p { font-size: 1.4rem; font-weight: 800; }

        .chart-card { background: white; margin: 0 24px 40px; padding: 30px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }

        .view { display: none; }
        .view.active { display: block; }
        .section-title { padding: 0 28px; font-weight: 800; color: var(--text); margin-bottom: 25px; font-size: 1.4rem; }

        /* ESTILO COMÚN BOTONES ELIMINAR */
        .btn-delete {
            background: #fee2e2; color: #ef4444; border: none;
            width: 32px; height: 32px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .btn-delete:active { transform: scale(0.85); background: #fca5a5; }

        /* MOVIMIENTOS */
        .mov-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--white); padding: 22px 24px; margin: 0 24px 15px;
            border-radius: 35px; transition: all 0.5s ease;
            opacity: 0.2; transform: translateY(20px);
        }
        .mov-item.in-view { opacity: 1; transform: translateY(0); margin: 0 0 2px; border-radius: 0; border-bottom: 1px solid #f1f5f9; }

        /* NAVEGACIÓN */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 100px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 25px; z-index: 50; border-top: 1px solid #f1f5f9;
        }
        .nav-item { color: #cbd5e1; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 800; gap: 5px; }
        .nav-item.active { color: var(--primary); }
        .btn-plus { width: 70px; height: 70px; background: var(--text); color: white; border: none; border-radius: 22px; display: flex; align-items: center; justify-content: center; transform: translateY(-25px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); }

        /* MODAL */
        #modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); display: none; flex-direction: column; justify-content: flex-end; z-index: 100; backdrop-filter: blur(8px); }
        .modal-body { background: var(--white); width: 100%; padding: 40px 30px; border-radius: 40px 40px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 20px; border-radius: 20px; border: 2px solid #f1f5f9; background: #f8fafc; margin-bottom: 15px; font-weight: 700; font-size: 1rem; outline: none; }
        .btn-confirm { width: 100%; padding: 22px; background: var(--primary); color: white; border: none; border-radius: 20px; font-weight: 800; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header" id="dynamic-header">
            <p class="balance-label">Disponible</p>
            <h1 class="balance-value" id="dom-balance">$0</h1>
        </div>

        <div class="content" id="scroll-area">
            <div class="summary-grid">
                <div class="card"><span>INGRESOS</span><p style="color:var(--success)" id="dom-ing">+$0</p></div>
                <div class="card"><span>GASTOS</span><p style="color:var(--error)" id="dom-egr">-$0</p></div>
            </div>

            <div id="v-home" class="view active">
                <div class="chart-card"><canvas id="lineChart" height="140"></canvas></div>
                <p class="section-title">Actividad</p>
                <div id="dom-list"></div>
            </div>

            <div id="v-goals" class="view" style="padding: 0 24px;">
                <p class="section-title" style="padding-left:0">Mis Objetivos</p>
                <div class="card" style="text-align: left; margin-bottom: 30px; padding: 30px; border-radius: 35px;">
                    <input type="text" id="g-name" placeholder="Nombre de la meta">
                    <input type="number" id="g-amount" placeholder="¿Cuánto necesitas? ($)">
                    <button class="btn-confirm" onclick="saveGoal()">Crear Meta</button>
                </div>
                <div id="dom-goals-list"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('v-home', this)"><i data-lucide="zap"></i>INICIO</div>
            <button class="btn-plus" onclick="openM()"><i data-lucide="plus" size="34"></i></button>
            <div class="nav-item" onclick="switchTab('v-goals', this)"><i data-lucide="target"></i>METAS</div>
        </nav>

        <div id="modal" onclick="if(event.target==this) closeM()">
            <div class="modal-body">
                <h2 style="margin-bottom:20px; font-weight: 800;">Nuevo Registro</h2>
                <input type="text" id="m-desc" placeholder="Descripción">
                <input type="number" id="m-amount" placeholder="0.00" inputmode="decimal">
                <select id="m-type">
                    <option value="out">Gasto (-)</option>
                    <option value="in">Ingreso (+)</option>
                </select>
                <button class="btn-confirm" onclick="saveData()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fz_vFinalPro')) || { m: [], g: [] };
        const header = document.getElementById('dynamic-header');
        const scrollArea = document.getElementById('scroll-area');

        scrollArea.addEventListener('scroll', () => {
            const st = scrollArea.scrollTop;
            const threshold = 160;
            let opacity = 1 - (st / threshold);
            if (opacity < 0) opacity = 0;
            let translate = st * 0.4; 
            header.style.opacity = opacity;
            header.style.transform = `translateY(-${translate}px)`;
        });

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
            if(id === 'v-home') renderLine();
            initObserver();
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function saveData() {
            const d = document.getElementById('m-desc').value, a = parseFloat(document.getElementById('m-amount').value), t = document.getElementById('m-type').value;
            if(!d || isNaN(a)) return;
            db.m.unshift({ id: Date.now(), d, a, t, date: new Date().toLocaleDateString() });
            saveAndRefresh();
            closeM();
            document.getElementById('m-desc').value = ''; document.getElementById('m-amount').value = '';
        }

        function deleteItem(id) {
            db.m = db.m.filter(x => x.id !== id);
            saveAndRefresh();
        }

        function deleteGoal(id) {
            db.g = db.g.filter(x => x.id !== id);
            saveAndRefresh();
        }

        function saveGoal() {
            const n = document.getElementById('g-name').value, a = parseFloat(document.getElementById('g-amount').value);
            if(!n || isNaN(a)) return;
            db.g.unshift({ id: Date.now(), n, a });
            saveAndRefresh();
            document.getElementById('g-name').value = ''; document.getElementById('g-amount').value = '';
        }

        function saveAndRefresh() {
            localStorage.setItem('fz_vFinalPro', JSON.stringify(db));
            updateUI();
        }

        function updateUI() {
            let i = 0, e = 0, mHtml = '';
            db.m.forEach(x => {
                const isI = x.t === 'in';
                if(isI) i += x.a; else e += x.a;
                mHtml += `<div class="mov-item">
                            <div style="display:flex; align-items:center; flex:1;">
                                <div style="width:50px; height:50px; border-radius:15px; background:${isI?'#dcfce7':'#fee2e2'}; color:${isI?'#10b981':'#ef4444'}; display:flex; align-items:center; justify-content:center; margin-right:15px;">
                                    <i data-lucide="${isI?'arrow-up':'shopping-bag'}" size="22"></i>
                                </div>
                                <div style="flex:1;">
                                    <b style="font-size:1.1rem;">${x.d}</b><br><small style="color:var(--secondary);font-weight:600">${x.date}</small>
                                </div>
                                <div style="text-align:right; margin-right:12px">
                                    <b style="color:${isI?'var(--success)':'var(--text)'}; font-size:1.2rem;">${isI?'+':'-'}$${x.a.toLocaleString()}</b>
                                </div>
                                <button class="btn-delete" onclick="deleteItem(${x.id})"><i data-lucide="trash-2" size="14"></i></button>
                            </div>
                         </div>`;
            });

            const bal = i - e;
            document.getElementById('dom-balance').innerText = `$${bal.toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${i.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${e.toLocaleString()}`;
            document.getElementById('dom-list').innerHTML = mHtml || '<p style="text-align:center; padding:50px; opacity:0.4;">Sin movimientos</p>';
            
            updateGoals(bal);
            renderLine();
            lucide.createIcons();
            initObserver();
        }

        function updateGoals(balance) {
            let gHtml = '';
            db.g.forEach(x => {
                let perc = Math.min((balance / x.a) * 100, 100);
                if(balance <= 0) perc = 0;
                gHtml += `<div class="card" style="margin-bottom:20px; text-align:left; padding:30px;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start">
                                <b style="font-size:1.25rem; flex:1">${x.n}</b>
                                <button class="btn-delete" onclick="deleteGoal(${x.id})"><i data-lucide="x" size="14"></i></button>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-top:15px; font-weight:700; color:var(--secondary); font-size:0.85rem;">
                                <span>$${balance.toLocaleString()} ahorrados</span>
                                <span>Meta:$${x.a.toLocaleString()}</span>
                            </div>
                            <div style="width:100%; height:10px; background:#f1f5f9; border-radius:10px; margin-top:10px; overflow:hidden">
                                <div style="width:${perc}%; height:100%; background:linear-gradient(90deg, #4f46e5, #9333ea); transition:1.5s cubic-bezier(0.1, 0, 0, 1)"></div>
                            </div>
                          </div>`;
            });
            document.getElementById('dom-goals-list').innerHTML = gHtml;
        }

        function renderLine() {
            const ctx = document.getElementById('lineChart').getContext('2d');
            let b = 0; const pts = [...db.m].reverse().map(x => { b += (x.t === 'in' ? x.a : -x.a); return b; });
            if(window.lc) window.lc.destroy();
            window.lc = new Chart(ctx, { 
                type: 'line', 
                data: { labels: pts.map(()=>''), datasets: [{ data: pts, borderColor: '#4f46e5', borderWidth: 4, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.04)' }] }, 
                options: { maintainAspectRatio: false, plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} } 
            });
        }

        function initObserver() {
            const items = document.querySelectorAll('.mov-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('in-view'); });
            }, { threshold: 0.2 });
            items.forEach(item => observer.observe(item));
        }

        updateUI();
    </script>
</body>
</html>
