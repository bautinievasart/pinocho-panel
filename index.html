<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly v6 | Bauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #6366f1; --bg: #f8fafc; --card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --success: #10b981; --danger: #f43f5e;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #e2e8f0; display: flex; justify-content: center; color: var(--text-main); }

        .phone-container {
            width: 100%; max-width: 430px; background: var(--bg); min-height: 100vh;
            position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.1); padding-bottom: 100px;
        }

        /* --- VISTAS --- */
        .view { display: none; padding: 25px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER --- */
        .header {
            background: var(--primary); color: white; padding: 40px 25px 60px 25px;
            border-bottom-left-radius: 35px; border-bottom-right-radius: 35px; margin-bottom: -40px;
        }
        .balance-label { font-size: 0.9rem; opacity: 0.8; font-weight: 600; }
        .balance-amount { font-size: 3rem; font-weight: 800; letter-spacing: -2px; margin: 5px 0; }

        /* --- GRID DE RESUMEN --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 30px; position: relative; z-index: 10; }
        .stat-box { 
            background: var(--card); padding: 15px 10px; border-radius: 20px; text-align: center; 
            box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02);
        }
        .stat-box span { display: block; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; }
        .stat-box strong { font-size: 0.95rem; font-weight: 800; }

        /* --- TARJETAS DE CONTENIDO --- */
        .card-ui { background: var(--card); border-radius: 25px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* --- LISTA MOVIMIENTOS --- */
        .mov-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0; border-bottom: 1px solid #f1f5f9;
        }
        .mov-item:last-child { border: none; }
        .mov-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .mov-info p { font-weight: 700; font-size: 0.9rem; }
        .mov-info span { font-size: 0.7rem; color: var(--text-muted); }

        /* --- NAVBAR --- */
        .nav-bottom {
            position: fixed; bottom: 0; width: 100%; max-width: 430px; height: 85px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid #f1f5f9; padding-bottom: 15px; z-index: 100;
        }
        .nav-btn { color: #cbd5e1; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 12px; }
        .nav-btn.active { color: var(--primary); background: #eff6ff; }
        .btn-add { 
            width: 55px; height: 55px; background: var(--text-main); color: white; border-radius: 18px;
            display: flex; align-items: center; justify-content: center; border: none;
            transform: translateY(-25px); box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- MODAL --- */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 200; backdrop-filter: blur(5px); }
        .modal-content { background: white; width: 100%; max-width: 430px; padding: 30px; border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; font-weight: 600; outline: none; }
        .btn-save { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- VISTA INICIO -->
        <div id="view-home" class="view active">
            <div class="header" style="margin-left:-25px; margin-right:-25px; margin-top:-25px;">
                <p class="balance-label">Balance Total</p>
                <h1 class="balance-amount" id="dom-balance">$0</h1>
                <div id="dom-usd" style="font-size:0.8rem; opacity:0.8;">Cargando...</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><span>Ingresos</span><strong style="color:var(--success)" id="dom-ing">+$0</strong></div>
                <div class="stat-box"><span>Gastos</span><strong style="color:var(--danger)" id="dom-egr">-$0</strong></div>
                <div class="stat-box"><span>Ahorro</span><strong style="color:var(--primary)" id="dom-net">$0</strong></div>
            </div>

            <div class="section-title">Actividad Reciente</div>
            <div class="card-ui">
                <canvas id="chart-waves" height="150"></canvas>
            </div>

            <div class="section-title">Últimos Movimientos</div>
            <div class="card-ui" id="dom-list">
                <!-- Movimientos aqui -->
            </div>
        </div>

        <!-- VISTA GRÁFICO (ANÁLISIS) -->
        <div id="view-stats" class="view">
            <h2 style="margin-bottom:20px; font-weight:800;">Análisis de Gastos</h2>
            <div class="card-ui">
                <canvas id="chart-pie" height="300"></canvas>
            </div>
            <div id="dom-pie-details"></div>
        </div>

        <!-- VISTA METAS -->
        <div id="view-goals" class="view">
            <h2 style="margin-bottom:20px; font-weight:800;">Objetivos</h2>
            <div class="card-ui">
                <input type="text" id="goal-name" placeholder="Nombre (Ej: Auto)">
                <input type="number" id="goal-target" placeholder="Monto Objetivo">
                <button class="btn-save" onclick="addGoal()">Crear Meta</button>
            </div>
            <div id="dom-goals-list"></div>
        </div>

        <!-- NAVBAR -->
        <div class="nav-bottom">
            <div class="nav-btn active" onclick="switchView('view-home', this)"><i data-lucide="home"></i></div>
            <div class="nav-btn" onclick="switchView('view-goals', this)"><i data-lucide="target"></i></div>
            <button class="btn-add" onclick="toggleModal(true)"><i data-lucide="plus"></i></button>
            <div class="nav-btn" onclick="switchView('view-stats', this)"><i data-lucide="pie-chart"></i></div>
            <div class="nav-btn" onclick="switchView('view-user', this)"><i data-lucide="user"></i></div>
        </div>
    </div>

    <!-- MODAL REGISTRO -->
    <div id="modal" onclick="if(event.target==this) toggleModal(false)">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; font-weight:800;">Nuevo Movimiento</h3>
            <input type="text" id="in-desc" placeholder="Descripción">
            <input type="number" id="in-amount" placeholder="Monto ($)">
            <select id="in-type">
                <option value="egreso">Gasto (-)</option>
                <option value="ingreso">Ingreso (+)</option>
            </select>
            <button class="btn-save" onclick="saveTransaction()">Registrar ahora</button>
        </div>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('finanzly_pro')) || { movs: [], goals: [] };

        function switchView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
            if(id === 'view-home') renderWaveChart();
            if(id === 'view-stats') renderPieChart();
            lucide.createIcons();
        }

        function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }

        function saveTransaction() {
            const desc = document.getElementById('in-desc').value;
            const amount = parseFloat(document.getElementById('in-amount').value);
            const type = document.getElementById('in-type').value;
            if(!desc || !amount) return;
            data.movs.unshift({ id: Date.now(), desc, amount, type, date: new Date().toLocaleDateString() });
            updateAll();
            toggleModal(false);
            document.getElementById('in-desc').value = '';
            document.getElementById('in-amount').value = '';
        }

        function deleteItem(id) {
            data.movs = data.movs.filter(m => m.id !== id);
            updateAll();
        }

        function updateAll() {
            localStorage.setItem('finanzly_pro', JSON.stringify(data));
            refreshUI();
        }

        function refreshUI() {
            let ing = 0, egr = 0;
            const listDom = document.getElementById('dom-list');
            listDom.innerHTML = '';

            data.movs.forEach(m => {
                const isIng = m.type === 'ingreso';
                if(isIng) ing += m.amount; else egr += m.amount;
                
                listDom.innerHTML += `
                    <div class="mov-item">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div class="mov-icon" style="background:${isIng ? '#dcfce7' : '#fee2e2'}; color:${isIng ? '#10b981' : '#f43f5e'}">
                                <i data-lucide="${isIng ? 'arrow-up-right' : 'shopping-cart'}" size="18"></i>
                            </div>
                            <div class="mov-info">
                                <p>${m.desc}</p>
                                <span>${m.date}</span>
                            </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <strong style="color:${isIng ? 'var(--success)' : 'var(--text-main)'}">${isIng?'+':'-'}$${m.amount.toLocaleString()}</strong>
                            <i data-lucide="trash-2" size="16" style="color:#cbd5e1; cursor:pointer;" onclick="deleteItem(${m.id})"></i>
                        </div>
                    </div>
                `;
            });

            const total = ing - egr;
            document.getElementById('dom-balance').innerText = `$${total.toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${ing.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${egr.toLocaleString()}`;
            document.getElementById('dom-net').innerText = `$${total.toLocaleString()}`;

            renderWaveChart();
            lucide.createIcons();
        }

        function renderWaveChart() {
            const ctx = document.getElementById('chart-waves').getContext('2d');
            let balance = 0;
            const points = [...data.movs].reverse().map(m => {
                balance += (m.type === 'ingreso' ? m.amount : -m.amount);
                return balance;
            });
            const labels = points.map(() => '');

            if(window.wChart) window.wChart.destroy();
            window.wChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length ? labels : ['','','',''],
                    datasets: [{
                        data: points.length ? points : [0,0,0,0],
                        borderColor: '#6366f1', borderWidth: 3, tension: 0.4, fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.1)', pointRadius: 0
                    }]
                },
                options: { plugins:{legend:{display:false}}, scales:{x:{display:false},y:{display:false}} }
            });
        }

        function renderPieChart() {
            const ctx = document.getElementById('chart-pie').getContext('2d');
            const gastos = data.movs.filter(m => m.type === 'egreso');
            const grouped = {};
            gastos.forEach(g => grouped[g.desc] = (grouped[g.desc] || 0) + g.amount);

            if(window.pChart) window.pChart.destroy();
            window.pChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(grouped),
                    datasets: [{
                        data: Object.values(grouped),
                        backgroundColor: ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '80%', plugins:{legend:{position:'bottom'}} }
            });
        }

        refreshUI();
    </script>
</body>
</html>
