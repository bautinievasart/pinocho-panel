<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByBauti - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #F8FAFD;
            --sidebar-bg: #FFFFFF;
            --card-bg: #FFFFFF;
            --text-main: #1B2559;
            --text-sec: #A3AED0;
            --accent: #4318FF;
            --success: #05CD99;
            --danger: #EE5D50;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
        }

        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); }

        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 40px 20px; border-right: 1px solid #E9EDF7; z-index: 1000; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; padding-left: 15px; }
        .logo span { color: var(--accent); }
        .nav-item { color: var(--text-sec); padding: 12px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; margin-bottom: 8px; }
        .nav-item.active { background: var(--accent); color: white; }

        .main-wrapper { margin-left: 260px; width: 100%; padding: 40px; }
        .view-section { display: none; max-width: 1000px; margin: 0 auto; }
        .view-section.active { display: block; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 24px; box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); border: 1px solid #E9EDF7; margin-bottom: 24px; }
        .card-title { font-size: 13px; color: var(--text-sec); font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }

        .flow-text { font-size: 36px; font-weight: 800; background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; }
        @keyframes flow { to { background-position: 200% center; } }
        .num-blue { background-image: var(--led-blue); }
        .num-green { background-image: var(--led-verde); }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 12px; border-bottom: 1px solid #F4F7FE; }
        td { padding: 16px 12px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 600; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        input { background: #F4F7FE; border: none; padding: 12px; border-radius: 12px; margin-right: 10px; font-weight: 600; }

        @media (max-width: 850px) {
            .sidebar { width: 100%; height: 60px; bottom: 0; top: auto; padding: 0; display: flex; justify-content: space-around; }
            .logo { display: none; }
            .nav-item { margin: 0; font-size: 10px; flex-direction: column; gap: 2px; }
            .main-wrapper { margin-left: 0; padding: 20px 15px 80px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-item active" onclick="show('v-dash', this)"><i class="fa-solid fa-chart-pie"></i><span>Dash</span></div>
        <div class="nav-item" onclick="show('v-ops', this)"><i class="fa-solid fa-list-check"></i><span>Ops</span></div>
        <div class="nav-item" onclick="show('v-pre', this)"><i class="fa-solid fa-wallet"></i><span>Caja</span></div>
        <div class="nav-item" onclick="cambiarCap()"><i class="fa-solid fa-sliders"></i><span>Cap</span></div>
    </div>

    <div class="main-wrapper">
        <div id="v-dash" class="view-section active">
            <h1>Dash <span id="timer" style="font-size: 12px; color: #ccc;">30s</span></h1>
            
            <div class="grid-2">
                <div class="card">
                    <div class="card-title">Capital</div>
                    <div class="flow-text num-blue" id="disp-cap">$0</div>
                </div>
                <div class="card">
                    <div class="card-title">Mejor Ganancia</div>
                    <div id="top-gan" class="flow-text num-green">$0</div>
                    <div id="top-ex" style="font-size: 12px; font-weight: 700; color: var(--accent);">---</div>
                </div>
            </div>

            <!-- COMPARATIVA MEP -->
            <div class="card">
                <div class="card-title">Dólar MEP vs P2P</div>
                <div style="display: flex; justify-content: space-between;">
                    <div id="val-mep" class="flow-text num-blue" style="font-size: 24px;">$0.00</div>
                    <div id="val-brecha" style="font-size: 24px; font-weight: 800; color: var(--success); text-align: right;">0.00%</div>
                </div>
                <div id="mep-info" style="font-size: 11px; margin-top: 5px; color: var(--text-sec); font-weight: 700;">CARGANDO MEP...</div>
            </div>

            <div class="card">
                <div class="card-title">Arbitraje USDT</div>
                <table>
                    <thead><tr><th>Exchange</th><th>Compra</th><th>Venta</th><th>Ganancia</th></tr></thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="v-ops" class="view-section">
            <h1>Operaciones</h1>
            <div class="card">
                <input type="number" id="o-monto" placeholder="ARS">
                <input type="number" id="o-compra" placeholder="C. Compra">
                <input type="number" id="o-venta" placeholder="C. Venta">
                <button class="btn-main" onclick="addOp()">Guardar</button>
            </div>
            <div class="card">
                <table id="t-ops"><thead><tr><th>Fecha</th><th>Invertido</th><th>Ganancia</th></tr></thead><tbody></tbody></table>
            </div>
        </div>

        <div id="v-pre" class="view-section">
            <h1>Caja</h1>
            <div class="card">
                <input type="text" id="p-desc" placeholder="Gasto/Ingreso">
                <input type="number" id="p-monto" placeholder="Monto">
                <button class="btn-main" onclick="addPre()">Agregar</button>
            </div>
            <div class="card">
                <table id="t-pre"><thead><tr><th>Fecha</th><th>Detalle</th><th>Monto</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>

    <script>
        let CAPITAL = localStorage.getItem('cap') ? parseFloat(localStorage.getItem('cap')) : 100000;
        let dbOps = JSON.parse(localStorage.getItem('ops')) || [];
        let dbPre = JSON.parse(localStorage.getItem('pre')) || [];
        let segs = 30;

        function show(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
        }

        async function update() {
            try {
                // USDT DATA
                const rU = await fetch('https://criptoya.com/api/usdt/ars/1');
                const dU = await rU.json();
                
                // MEP DATA
                const rM = await fetch('https://criptoya.com/api/dolares');
                const dM = await rM.json();

                const p2p = dU.binancep2p.bid;
                const mep = dM.mep.al30.ci.price;

                // UI MEP
                document.getElementById('val-mep').innerText = `$${mep.toFixed(2)}`;
                const brecha = ((p2p / mep) - 1) * 100;
                document.getElementById('val-brecha').innerText = brecha.toFixed(2) + '%';
                document.getElementById('mep-info').innerText = `P2P$${p2p} | MEP $${mep}`;

                // TABLA EXCHANGES
                const exs = ['lemoncash', 'belo', 'fiwind', 'buenbit', 'letsbit'];
                let h = '', mG = -99999, mE = '';

                exs.forEach(e => {
                    if(dU[e]) {
                        const ask = dU[e].ask;
                        const gan = (CAPITAL / ask * p2p) - CAPITAL;
                        if(gan > mG) { mG = gan; mE = e.toUpperCase(); }
                        h += `<tr><td>${e.toUpperCase()}</td><td>$${ask.toFixed(2)}</td><td>$${p2p}</td><td style="color:${gan>0?'#05CD99':'#EE5D50'}">$${gan.toFixed(0)}</td></tr>`;
                    }
                });

                document.getElementById('table-body').innerHTML = h;
                document.getElementById('top-gan').innerText = `$${mG.toFixed(0)}`;
                document.getElementById('top-ex').innerText = mE;
                segs = 30;
            } catch(e) {
                console.error(e);
                segs = 5;
            }
        }

        setInterval(() => {
            segs--;
            document.getElementById('timer').innerText = segs + 's';
            if(segs <= 0) update();
        }, 1000);

        function render() {
            document.getElementById('disp-cap').innerText = '$' + CAPITAL.toLocaleString();
            document.getElementById('t-ops').querySelector('tbody').innerHTML = dbOps.map(o => `<tr><td>${o.f}</td><td>$${o.m}</td><td>$${o.g.toFixed(0)}</td></tr>`).join('');
            document.getElementById('t-pre').querySelector('tbody').innerHTML = dbPre.map(p => `<tr><td>${p.f}</td><td>${p.d}</td><td>$${p.m}</td></tr>`).join('');
        }

        function save() {
            localStorage.setItem('ops', JSON.stringify(dbOps));
            localStorage.setItem('pre', JSON.stringify(dbPre));
            localStorage.setItem('cap', CAPITAL);
            render();
        }

        function addOp() {
            const m = parseFloat(document.getElementById('o-monto').value);
            const c = parseFloat(document.getElementById('o-compra').value);
            const v = parseFloat(document.getElementById('o-venta').value);
            if(!m || !c || !v) return;
            dbOps.unshift({ f: new Date().toLocaleDateString(), m, g: (m/c*v)-m });
            save();
        }

        function addPre() {
            const d = document.getElementById('p-desc').value;
            const m = parseFloat(document.getElementById('p-monto').value);
            if(!d || !m) return;
            dbPre.unshift({ f: new Date().toLocaleDateString(), d, m });
            save();
        }

        function cambiarCap() {
            const p = prompt("Capital:", CAPITAL);
            if(p) { CAPITAL = parseFloat(p); save(); update(); }
        }

        render();
        update();
    </script>
</body>
</html>
