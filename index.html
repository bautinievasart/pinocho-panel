<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByBauti - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4318FF; --bg: #F8FAFD; --text: #1B2559; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #E9EDF7; }
        .val { font-size: 32px; font-weight: 800; color: var(--accent); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #A3AED0; font-size: 12px; padding: 10px; border-bottom: 1px solid #F4F7FE; }
        td { padding: 12px 10px; border-bottom: 1px solid #F4F7FE; font-weight: 600; font-size: 14px; }
        #timer { font-size: 12px; font-weight: 700; color: #A3AED0; }
        .status { font-size: 11px; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2 style="margin:0;">Dashboard</h2>
        <div id="timer">Actualizando en 30s...</div>
    </div>

    <div class="card">
        <div style="color:#A3AED0; font-size:12px; font-weight:700; text-transform:uppercase;">Dólar MEP (AL30)</div>
        <div id="val-mep" class="val">$0.00</div>
        <div id="status-mep" class="status" style="color:orange;">CONECTANDO...</div>
    </div>

    <div class="card">
        <div style="color:#A3AED0; font-size:12px; font-weight:700; text-transform:uppercase;">Arbitraje USDT vs P2P</div>
        <table>
            <thead><tr><th>Exchange</th><th>Compra</th><th>Ganancia</th></tr></thead>
            <tbody id="table-body">
                <tr><td colspan="3">Cargando datos del mercado...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let CAPITAL = 100000;
        let timeLeft = 30;

        async function getData() {
            const statusMep = document.getElementById('status-mep');
            statusMep.innerText = "ACTUALIZANDO...";
            
            try {
                // Usamos un proxy para saltar el bloqueo de seguridad (CORS)
                const proxy = "https://api.allorigins.win/get?url=";
                const urlUsdt = encodeURIComponent("https://criptoya.com/api/usdt/ars/1");
                const urlDol = encodeURIComponent("https://criptoya.com/api/dolares");

                const [resUsdt, resDol] = await Promise.all([
                    fetch(proxy + urlUsdt).then(r => r.json()),
                    fetch(proxy + urlDol).then(r => r.json())
                ]);

                // AllOrigins devuelve los datos dentro de una propiedad 'contents' como string
                const dUsdt = JSON.parse(resUsdt.contents);
                const dDol = JSON.parse(resDol.contents);

                const p2p = dUsdt.binancep2p.bid;
                const mep = dDol.mep.al30.ci.price;

                // Actualizar MEP
                document.getElementById('val-mep').innerText = `$${mep.toFixed(2)}`;
                statusMep.innerText = `P2P$${p2p} | MEP $${mep}`;
                statusMep.style.color = "green";

                // Tabla
                const exs = ['lemoncash', 'belo', 'fiwind', 'buenbit', 'letsbit'];
                let html = '';
                exs.forEach(e => {
                    if(dUsdt[e]) {
                        const ask = dUsdt[e].ask;
                        const gan = (CAPITAL / ask * p2p) - CAPITAL;
                        html += `<tr>
                            <td>${e.toUpperCase()}</td>
                            <td>$${ask.toFixed(2)}</td>
                            <td style="color:${gan > 0 ? '#05CD99' : '#EE5D50'}">$${gan.toFixed(0)}</td>
                        </tr>`;
                    }
                });
                document.getElementById('table-body').innerHTML = html;
                timeLeft = 30;

            } catch (err) {
                console.error(err);
                statusMep.innerText = "ERROR DE CONEXIÓN - REINTENTANDO";
                statusMep.style.color = "red";
                timeLeft = 10;
            }
        }

        setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = `Actualizando en ${timeLeft}s...`;
            if(timeLeft <= 0) getData();
        }, 1000);

        getData();
    </script>
</body>
</html>
