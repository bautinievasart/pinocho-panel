<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Dynamic</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #fdfeff; --primary: #4f46e5; --text: #0f172a;
            --secondary: #64748b; --white: #ffffff; --success: #10b981;
            --error: #ef4444; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background: var(--bg); color: var(--text); overflow: hidden; }

        .app-shell {
            width: 100vw; height: 100dvh;
            display: flex; flex-direction: column; position: relative;
        }

        /* --- HEADER CON DEGRADADO DINÁMICO --- */
        .header {
            background: linear-gradient(-45deg, #4f46e5, #7c3aed, #2563eb, #4338ca);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            padding: 60px 24px 80px;
            border-radius: 0 0 45px 45px;
            flex-shrink: 0;
            text-align: center;
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.2);
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .balance-label { font-size: 0.75rem; opacity: 0.8; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .balance-value { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; margin-top: 5px; }

        /* --- CONTENT AREA --- */
        .content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0 0 120px; /* Quitamos padding lateral para que los items puedan ocupar todo */
            margin-top: -45px;
            scroll-behavior: smooth;
        }

        .summary-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            padding: 0 20px; margin-bottom: 40px;
        }

        .card {
            background: var(--white); padding: 22px 15px; border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.04); text-align: center;
        }

        /* --- VISTAS --- */
        .view { display: none; }
        .view.active { display: block; }

        /* --- ANIMACIÓN DE MOVIMIENTOS AL SCROLEAR --- */
        .section-title { padding: 0 24px; font-weight: 800; color: var(--secondary); margin-bottom: 20px; font-size: 0.9rem; }

        .mov-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--white);
            padding: 24px;
            margin: 0 10px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.3;
            transform: scale(0.85) translateY(30px);
        }

        /* Clase que se activa con el Scroll */
        .mov-item.in-view {
            opacity: 1;
            transform: scale(1) translateY(0);
            margin: 0 0 15px; /* Ocupa más ancho al estar activo */
            border-radius: 0; /* Efecto de ocupar toda la pantalla */
            border-bottom: 1px solid #f1f5f9;
            box-shadow: none;
        }

        /* --- NAV BAR SIMPLIFICADA --- */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(0,0,0,0.03); padding-bottom: 15px; z-index: 50;
        }
        .nav-item { color: #cbd5e1; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; font-weight: 700; }
        .nav-item.active { color: var(--primary); }
        .btn-plus {
            width: 65px; height: 65px; background: var(--text);
            color: white; border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transform: translateY(-25px); box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        /* --- MODAL --- */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; flex-direction: column; justify-content: flex-end; z-index: 100;
        }
        .modal-body {
            background: var(--white); width: 100%; padding: 40px 25px;
            border-radius: 40px 40px 0 0; animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { 
            width: 100%; padding: 20px; border-radius: 20px; border: 1px solid #f1f5f9;
            background: #f8fafc; margin-bottom: 15px; font-weight: 700; outline: none; 
        }
        .btn-confirm { 
            width: 100%; padding: 20px; background: var(--primary); color: white;
            border: none; border-radius: 20px; font-weight: 800; font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="app-shell">
        <div class="header">
            <p class="balance-label">Tu Balance Actual</p>
            <h1 class="balance-value" id="dom-balance">$0</h1>
        </div>

        <div class="content" id="scroll-area">
            <div class="summary-grid">
                <div class="card"><span>INGRESOS</span><p style="color:var(--success)" id="dom-ing">+$0</p></div>
                <div class="card"><span>GASTOS</span><p style="color:var(--error)" id="dom-egr">-$0</p></div>
            </div>

            <!-- HOME -->
            <div id="v-home" class="view active">
                <p class="section-title">ACTIVIDAD</p>
                <div id="dom-list">
                    <!-- Los items se cargan aquí -->
                </div>
            </div>

            <!-- METAS -->
            <div id="v-goals" class="view" style="padding: 0 20px;">
                <p class="section-title" style="padding:0">METAS DE AHORRO</p>
                <div class="card" style="text-align: left; margin-bottom: 30px;">
                    <input type="text" id="g-name" placeholder="¿Qué quieres comprar?">
                    <input type="number" id="g-amount" placeholder="Monto total ($)">
                    <button class="btn-confirm" onclick="saveGoal()">Crear Objetivo</button>
                </div>
                <div id="dom-goals-list"></div>
            </div>
        </div>

        <!-- NAV BAR SIMPLIFICADA -->
        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('v-home', this)"><i data-lucide="zap"></i>INICIO</div>
            <button class="btn-plus" onclick="openM()"><i data-lucide="plus" size="35"></i></button>
            <div class="nav-item" onclick="switchTab('v-goals', this)"><i data-lucide="target"></i>METAS</div>
        </nav>

        <!-- MODAL -->
        <div id="modal" onclick="if(event.target==this) closeM()">
            <div class="modal-body">
                <h3 style="margin-bottom:25px; font-weight: 800;">Nuevo Registro</h3>
                <input type="text" id="m-desc" placeholder="¿En qué se fue el dinero?">
                <input type="number" id="m-amount" placeholder="Monto ($)" inputmode="decimal">
                <select id="m-type">
                    <option value="out">Gasto (-)</option>
                    <option value="in">Ingreso (+)</option>
                </select>
                <button class="btn-confirm" onclick="saveData()">Guardar Registro</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('fz_v12')) || { m: [], g: [] };

        function switchTab(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            lucide.createIcons();
            initObserver(); // Re-inicializar el efecto de scroll
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }

        function saveData() {
            const d = document.getElementById('m-desc').value, a = parseFloat(document.getElementById('m-amount').value), t = document.getElementById('m-type').value;
            if(!d || isNaN(a)) return;
            db.m.unshift({ id: Date.now(), d, a, t, date: new Date().toLocaleDateString() });
            saveAndRefresh();
            closeM();
            document.getElementById('m-desc').value = ''; document.getElementById('m-amount').value = '';
        }

        function saveGoal() {
            const n = document.getElementById('g-name').value, a = parseFloat(document.getElementById('g-amount').value);
            if(!n || isNaN(a)) return;
            db.g.unshift({ id: Date.now(), n, a });
            saveAndRefresh();
        }

        function saveAndRefresh() {
            localStorage.setItem('fz_v12', JSON.stringify(db));
            updateUI();
        }

        function updateUI() {
            let i = 0, e = 0, mHtml = '';
            db.m.forEach(x => {
                const isI = x.t === 'in';
                if(isI) i += x.a; else e += x.a;
                mHtml += `<div class="mov-item">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div style="width:50px; height:50px; border-radius:15px; background:${isI?'#dcfce7':'#fee2e2'}; color:${isI?'#10b981':'#ef4444'}; display:flex; align-items:center; justify-content:center;">
                                    <i data-lucide="${isI?'arrow-up':'shopping-bag'}"></i>
                                </div>
                                <div><b style="font-size:1.1rem;">${x.d}</b><br><small style="color:var(--secondary)">${x.date}</small></div>
                            </div>
                            <b style="color:${isI?'var(--success)':'var(--text)'}; font-size:1.2rem;">${isI?'+':'-'}$${x.a.toLocaleString()}</b>
                         </div>`;
            });

            document.getElementById('dom-balance').innerText = `$${(i - e).toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${i.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${e.toLocaleString()}`;
            document.getElementById('dom-list').innerHTML = mHtml || '<p style="text-align:center; padding:50px; color:#94a3b8;">No hay actividad</p>';
            
            updateGoals(i-e);
            lucide.createIcons();
            initObserver(); // Activar animaciones de scroll
        }

        function updateGoals(balance) {
            let gHtml = '';
            db.g.forEach(x => {
                let perc = Math.min((balance / x.a) * 100, 100);
                if(balance <= 0) perc = 0;
                gHtml += `<div class="card" style="margin-bottom:15px; text-align:left">
                            <b>${x.n}</b><br><small>$${balance.toLocaleString()} de$${x.a.toLocaleString()}</small>
                            <div style="width:100%; height:8px; background:#f1f5f9; border-radius:10px; margin-top:10px; overflow:hidden">
                                <div style="width:${perc}%; height:100%; background:var(--success); transition:1s"></div>
                            </div>
                          </div>`;
            });
            document.getElementById('dom-goals-list').innerHTML = gHtml;
        }

        // --- LÓGICA DEL EFECTO ANIMADO DE SCROLL ---
        function initObserver() {
            const items = document.querySelectorAll('.mov-item');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    } else {
                        entry.target.classList.remove('in-view');
                    }
                });
            }, {
                threshold: 0.6, // Se activa cuando el 60% del item está visible
                rootMargin: "0px 0px -10% 0px"
            });

            items.forEach(item => observer.observe(item));
        }

        updateUI();
    </script>
</body>
</html>
