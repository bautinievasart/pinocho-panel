<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ByBauti - Finance Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #F8FAFD; --sidebar-bg: #FFFFFF; --text-main: #1B2559;
            --text-sec: #A3AED0; --accent: #4318FF; --success: #05CD99; --danger: #EE5D50;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
        }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 40px 20px; border-right: 1px solid #E9EDF7; z-index: 1000; transition: 0.3s; }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; padding-left: 15px; }
        .logo span { color: var(--accent); }
        .nav-container { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { color: var(--text-sec); padding: 12px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item.active { background: var(--accent); color: white; box-shadow: 0px 10px 20px rgba(67, 24, 255, 0.2); }
        .main-wrapper { margin-left: 260px; width: 100%; padding: 40px; }
        .view-section { display: none; max-width: 1100px; margin: 0 auto; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: white; border-radius: 20px; padding: 24px; box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); border: 1px solid #E9EDF7; margin-bottom: 24px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .flow-text { font-size: 38px; font-weight: 800; background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; }
        @keyframes flow { to { background-position: 200% center; } }
        .num-blue { background-image: var(--led-blue); }
        .num-green { background-image: var(--led-verde); }
        .table-wrapper { overflow-x: auto; width: 100%; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 12px; border-bottom: 1px solid #F4F7FE; text-transform: uppercase; }
        td { padding: 16px 12px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 600; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select { background: #F4F7FE; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-family: inherit; }
        .btn-main { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .btn-del { color: var(--danger); background: #FFF5F5; border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 850px) {
            .sidebar { width: 100%; height: 70px; bottom: 0; top: auto; flex-direction: row; border-top: 1px solid #E9EDF7; }
            .logo { display: none; }
            .nav-container { flex-direction: row; width: 100%; justify-content: space-around; align-items: center; }
            .nav-item { flex-direction: column; font-size: 10px; padding: 8px; margin: 0; }
            .main-wrapper { margin-left: 0; padding: 20px 15px 90px; }
            .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-container">
            <div class="nav-item active" onclick="show('v-dash', this)"><i class="fa-solid fa-chart-pie"></i><span>Dash</span></div>
            <div class="nav-item" onclick="show('v-ops', this)"><i class="fa-solid fa-list-check"></i><span>Ops</span></div>
            <div class="nav-item" onclick="show('v-pre', this)"><i class="fa-solid fa-wallet"></i><span>Caja</span></div>
            <div class="nav-item" onclick="cambiarCap()"><i class="fa-solid fa-sliders"></i><span>Cap</span></div>
        </div>
    </div>

    <div class="main-wrapper">
        <!-- DASHBOARD -->
        <div id="v-dash" class="view-section active">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Panel Pinocho</h1>
                <span id="timer" style="font-size:12px; font-weight:700; color:var(--text-sec)">30s</span>
            </div>
            <div class="grid-2">
                <div class="card"><div style="font-size:12px; font-weight:700; color:var(--text-sec)">CAPITAL</div><div class="flow-text num-blue" id="disp-cap">$0</div></div>
                <div class="card"><div style="font-size:12px; font-weight:700; color:var(--text-sec)">MEJOR GANANCIA</div><div id="top-gan" class="flow-text num-green">$0</div><div id="top-ex" style="font-weight:800; color:var(--accent); font-size:14px">---</div></div>
            </div>
            <div class="card">
                <div style="display:flex; justify-content:space-between;">
                    <div><div style="font-size:12px; font-weight:700; color:var(--text-sec)">DÓLAR MEP (AL30)</div><div id="val-mep" class="flow-text num-blue" style="font-size:28px">$0</div></div>
                    <div style="text-align:right;"><div style="font-size:12px; font-weight:700; color:var(--text-sec)">BRECHA P2P</div><div id="val-brecha" style="font-size:28px; font-weight:800; color:var(--success)">0.00%</div></div>
                </div>
                <p id="mep-status" style="font-size:11px; font-weight:800; color:var(--text-sec); margin-top:10px;">BUSCANDO PRECIOS...</p>
            </div>
            <div class="card"><div class="table-wrapper"><table><thead><tr><th>Exchange</th><th>Compra</th><th>Venta</th><th>Ganancia</th></tr></thead><tbody id="t-p2p"></tbody></table></div></div>
        </div>

        <!-- OPERACIONES -->
        <div id="v-ops" class="view-section">
            <h1>Registro Operativo</h1>
            <div class="card"><div class="form-grid"><input type="number" id="o-m" placeholder="Monto ARS"><input type="number" id="o-b" placeholder="Compra"><input type="number" id="o-s" placeholder="Venta"><button class="btn-main" onclick="addOp()">Registrar</button></div></div>
            <div class="card"><div class="table-wrapper"><table><thead><tr><th>Fecha</th><th>Inversión</th><th>Ganancia</th><th></th></tr></thead><tbody id="h-ops"></tbody></table></div></div>
        </div>

        <!-- CAJA -->
        <div id="v-pre" class="view-section">
            <h1>Caja y Flujo</h1>
            <div class="grid-2">
                <div class="card"><div style="font-size:12px; font-weight:700; color:var(--text-sec)">SALDO NETO</div><div id="c-total" style="font-size:36px; font-weight:800; color:var(--accent)">$0</div><div style="margin-top:10px; font-weight:700;"><span id="c-in" style="color:var(--success)">+$0</span> | <span id="c-out" style="color:var(--danger)">-$0</span></div></div>
                <div class="card"><canvas id="cajaChart" style="max-height:100px;"></canvas></div>
            </div>
            <div class="card"><div class="form-grid"><input type="text" id="p-d" placeholder="Detalle"><input type="number" id="p-m" placeholder="Monto"><select id="p-t"><option value="in">Ingreso (+)</option><option value="out">Egreso (-)</option></select><button class="btn-main" onclick="addPre()">Cargar</button></div></div>
            <div class="card"><div class="table-wrapper"><table><thead><tr><th>Fecha</th><th>Detalle</th><th>Monto</th><th></th></tr></thead><tbody id="h-pre"></tbody></table></div></div>
        </div>
    </div>

    <script>
        let CAPITAL = localStorage.getItem('cap') ? parseFloat(localStorage.getItem('cap')) : 100000;
        let dbOps = JSON.parse(localStorage.getItem('ops')) || [];
        let dbPre = JSON.parse(localStorage.getItem('pre')) || [];
        let segs = 30;
        let chart;

        function show(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
            if(id === 'v-pre') render();
        }

        async function fetchRetry(url) {
            // Intentamos con 3 proxies distintos por si uno falla
            const proxies = [
                "https://api.allorigins.win/get?url=",
                "https://corsproxy.io/?",
                "https://thingproxy.freeboard.io/fetch/"
            ];
            
            for (let proxy of proxies) {
                try {
                    const target = proxy.includes('allorigins') ? proxy + encodeURIComponent(url) : proxy + url;
                    const res = await fetch(target);
                    const data = await res.json();
                    return proxy.includes('allorigins') ? JSON.parse(data.contents) : data;
                } catch (e) { continue; }
            }
            throw new Error("Todos los proxies fallaron");
        }

        async function update() {
            try {
                const dU = await fetchRetry('https://criptoya.com/api/usdt/ars/1');
                const dD = await fetchRetry('https://criptoya.com/api/dolares');
                
                const p2p = dU.binancep2p.bid;
                const mep = dD.mep.al30.ci.price;

                document.getElementById('val-mep').innerText = `$${mep.toFixed(2)}`;
                document.getElementById('val-brecha').innerText = (((p2p/mep)-1)*100).toFixed(2) + '%';
                document.getElementById('mep-status').innerText = `P2P:$${p2p} | MEP: $${mep}`;

                const exs = ['lemoncash', 'belo', 'fiwind', 'buenbit', 'letsbit', 'tiendacrypto'];
                let h = '', mG = -99999, mE = '';

                exs.forEach(e => {
                    if(dU[e]) {
                        const ask = dU[e].ask, gan = (CAPITAL / ask * p2p) - CAPITAL;
                        if(gan > mG) { mG = gan; mE = e.toUpperCase(); }
                        h += `<tr><td>${e.toUpperCase()}</td><td>$${ask.toFixed(2)}</td><td>$${p2p}</td><td style="color:${gan>0?'var(--success)':'var(--danger)'}">$${gan.toFixed(0)}</td></tr>`;
                    }
                });
                document.getElementById('t-p2p').innerHTML = h;
                document.getElementById('top-gan').innerText = `$${mG.toFixed(0)}`;
                document.getElementById('top-ex').innerText = mE;
                segs = 30;
            } catch(e) { document.getElementById('mep-status').innerText = "ERROR DE CONEXIÓN. REINTENTANDO..."; segs = 5; }
        }

        function render() {
            document.getElementById('disp-cap').innerText = '$' + CAPITAL.toLocaleString();
            document.getElementById('h-ops').innerHTML = dbOps.map(o => `<tr><td>${o.f}</td><td>$${o.m.toLocaleString()}</td><td style="color:${o.g>0?'var(--success)':'var(--danger)'}">$${o.g.toFixed(0)}</td><td><button class="btn-del" onclick="delOp(${o.id})">✕</button></td></tr>`).join('');
            
            let i = 0, e = 0;
            document.getElementById('h-pre').innerHTML = dbPre.map(p => {
                p.t === 'in' ? i += p.m : e += p.m;
                return `<tr><td>${p.f}</td><td>${p.d}</td><td style="color:${p.t==='in'?'var(--success)':'var(--danger)'}">${p.t==='in'?'+':'-'}$${p.m.toLocaleString()}</td><td><button class="btn-del" onclick="delPre(${p.id})">✕</button></td></tr>`;
            }).join('');
            
            document.getElementById('c-in').innerText = '+$' + i.toLocaleString();
            document.getElementById('c-out').innerText = '-$' + e.toLocaleString();
            document.getElementById('c-total').innerText = '$' + (i - e).toLocaleString();
            updateChart();
        }

        function updateChart() {
            const ctx = document.getElementById('cajaChart');
            const data = [...dbPre].reverse().map(p => p.t === 'in' ? p.m : -p.m);
            if(chart) chart.destroy();
            chart = new Chart(ctx, { type: 'line', data: { labels: data.map((_,idx)=>idx), datasets: [{ data, borderColor: '#4318FF', tension: 0.4, borderWeight: 2, pointRadius: 0 }] }, options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } } });
        }

        function save() { localStorage.setItem('ops', JSON.stringify(dbOps)); localStorage.setItem('pre', JSON.stringify(dbPre)); localStorage.setItem('cap', CAPITAL); render(); }
        function addOp() { const m = parseFloat(document.getElementById('o-m').value), b = parseFloat(document.getElementById('o-b').value), s = parseFloat(document.getElementById('o-s').value); if(m&&b&&s) { dbOps.unshift({id:Date.now(), f:new Date().toLocaleDateString(), m, g:(m/b*s)-m}); save(); } }
        function addPre() { const d = document.getElementById('p-d').value, m = parseFloat(document.getElementById('p-m').value), t = document.getElementById('p-t').value; if(d&&m) { dbPre.unshift({id:Date.now(), f:new Date().toLocaleDateString(), d, m, t}); save(); } }
        function delOp(id) { dbOps = dbOps.filter(x => x.id !== id); save(); }
        function delPre(id) { dbPre = dbPre.filter(x => x.id !== id); save(); }
        function cambiarCap() { const p = prompt("Capital:", CAPITAL); if(p) { CAPITAL = parseFloat(p); save(); update(); } }

        setInterval(() => { segs--; document.getElementById('timer').innerText = segs + 's'; if(segs <= 0) update(); }, 1000);
        render(); update();
    </script>
</body>
</html>
