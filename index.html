<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #f8fafc; --primary: #4f46e5; --text: #0f172a;
            --secondary: #64748b; --white: #ffffff;
        }

        @keyframes dynamicGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animación para números */
        @keyframes textGlowSuccess {
            0% { color: #10b981; } 50% { color: #34d399; } 100% { color: #10b981; }
        }
        @keyframes textGlowError {
            0% { color: #ef4444; } 50% { color: #f87171; } 100% { color: #ef4444; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* Estructura Principal */
        .app-shell { display: flex; flex-direction: column; height: 100vh; }

        .header {
            background: linear-gradient(-45deg, #4f46e5, #9333ea, #2563eb);
            background-size: 300% 300%;
            animation: dynamicGlow 6s ease infinite;
            padding: 50px 24px 30px;
            border-radius: 0 0 40px 40px;
            text-align: center;
            color: white;
            flex-shrink: 0;
        }

        .month-selector {
            background: rgba(255,255,255,0.2);
            border: none; color: white; padding: 6px 12px;
            border-radius: 10px; font-weight: 700; font-size: 0.75rem;
            margin-bottom: 10px; outline: none;
        }

        .balance-label { font-size: 0.7rem; opacity: 0.8; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .balance-value { font-size: 3rem; font-weight: 800; letter-spacing: -1px; }

        /* Scroll Area */
        .content {
            flex: 1; overflow-y: auto; padding: 20px 20px 120px;
        }

        /* Tarjetas de Resumen */
        .summary-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; 
            margin-bottom: 25px;
        }
        .card { 
            background: white; padding: 20px; border-radius: 24px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.03); text-align: center;
        }
        .card span { font-size: 0.65rem; font-weight: 800; color: var(--secondary); display: block; margin-bottom: 5px; }
        
        .val-ing { font-size: 1.3rem; font-weight: 800; animation: textGlowSuccess 3s infinite; }
        .val-egr { font-size: 1.3rem; font-weight: 800; animation: textGlowError 3s infinite; }

        .chart-card { background: white; padding: 20px; border-radius: 28px; margin-bottom: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.02); }
        .section-title { font-weight: 800; margin-bottom: 15px; font-size: 1.1rem; color: var(--text); }

        /* Lista de Movimientos */
        .mov-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; padding: 16px; margin-bottom: 10px;
            border-radius: 20px; border-bottom: 1px solid #f1f5f9;
        }
        .mov-icon {
            width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; margin-right: 12px;
        }

        /* Navegación */
        .nav-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 85px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; border-top: 1px solid #f1f5f9;
        }
        .nav-item { color: #cbd5e1; display: flex; flex-direction: column; align-items: center; font-size: 0.6rem; font-weight: 800; }
        .nav-item.active { color: var(--primary); }
        .btn-plus { 
            width: 60px; height: 60px; background: var(--text); color: white; 
            border: none; border-radius: 20px; display: flex; align-items: center; 
            justify-content: center; transform: translateY(-20px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }

        /* Modales e Inputs */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: flex-end; z-index: 100; }
        .modal-body { background: white; width: 100%; padding: 30px; border-radius: 30px 30px 0 0; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #f1f5f9; background: #f8fafc; margin-bottom: 10px; font-weight: 600; outline: none; }
        .btn-confirm { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; }
        
        #setup-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    </style>
</head>
<body>

    <div id="setup-screen" style="display:none;">
        <h2 style="margin-bottom: 20px;">Vincular Pareja</h2>
        <input type="text" id="couple-id" placeholder="Código compartido" style="text-align:center">
        <button class="btn-confirm" onclick="startSync()">Entrar</button>
    </div>

    <div class="app-shell">
        <div class="header">
            <select class="month-selector" id="month-picker" onchange="changePeriod(this.value)"></select>
            <p class="balance-label">Disponible</p>
            <h1 class="balance-value" id="dom-balance">$0</h1>
        </div>

        <div class="content">
            <div class="summary-grid">
                <div class="card"><span>INGRESOS</span><p class="val-ing" id="dom-ing">+$0</p></div>
                <div class="card"><span>GASTOS</span><p class="val-egr" id="dom-egr">-$0</p></div>
            </div>

            <div id="v-home" class="view active">
                <div class="chart-card"><canvas id="lineChart" height="120"></canvas></div>
                <p class="section-title">Actividad Reciente</p>
                <div id="dom-list"></div>
            </div>
            
            <div id="v-goals" class="view" style="display:none">
                <p class="section-title">Metas en Pareja</p>
                <div id="dom-goals-list"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('v-home', this)"><i data-lucide="home"></i>INICIO</div>
            <button class="btn-plus" onclick="openM()"><i data-lucide="plus"></i></button>
            <div class="nav-item" onclick="switchTab('v-goals', this)"><i data-lucide="target"></i>METAS</div>
        </nav>
    </div>

    <div id="modal" onclick="if(event.target==this) closeM()">
        <div class="modal-body">
            <h3 style="margin-bottom:15px">Nuevo movimiento</h3>
            <input type="text" id="m-desc" placeholder="¿Qué compraste?">
            <input type="number" id="m-amount" placeholder="Monto">
            <select id="m-type">
                <option value="out">Gasto</option>
                <option value="in">Ingreso</option>
            </select>
            <button class="btn-confirm" onclick="saveData()">Guardar</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (DEBES COMPLETAR ESTO)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            appId: "TU_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let currentCoupleID = localStorage.getItem('fz_coupleID') || 'demo';
        let currentPeriod = new Date().toLocaleString('es-ES', { month: 'long', year: 'numeric' });

        function initApp() {
            database.ref('couples/' + currentCoupleID).on('value', (snap) => {
                window.db = snap.val() || { data: {}, g: [] };
                updateUI();
            });
        }

        function saveData() {
            const d = document.getElementById('m-desc').value, a = parseFloat(document.getElementById('m-amount').value), t = document.getElementById('m-type').value;
            if(!d || isNaN(a)) return;
            if(!window.db.data[currentPeriod]) window.db.data[currentPeriod] = { m: [] };
            window.db.data[currentPeriod].m.unshift({ id: Date.now(), d, a, t, date: new Date().toLocaleDateString() });
            database.ref('couples/' + currentCoupleID).set(window.db);
            closeM();
        }

        function updateUI() {
            let i = 0, e = 0, mHtml = '';
            const movements = window.db.data?.[currentPeriod]?.m || [];
            movements.forEach(x => {
                const isI = x.t === 'in';
                if(isI) i += x.a; else e += x.a;
                mHtml += `<div class="mov-item">
                    <div style="display:flex; align-items:center;">
                        <div class="mov-icon" style="background:${isI?'#dcfce7':'#fee2e2'}; color:${isI?'#10b981':'#ef4444'}">
                            <i data-lucide="${isI?'arrow-up-right':'shopping-cart'}" size="18"></i>
                        </div>
                        <div><b style="font-size:0.9rem">${x.d}</b><br><small style="color:var(--secondary)">${x.date}</small></div>
                    </div>
                    <b style="color:${isI?'#10b981':'#0f172a'}">${isI?'+':'-'}$${x.a.toLocaleString()}</b>
                </div>`;
            });
            document.getElementById('dom-balance').innerText = `$${(i - e).toLocaleString()}`;
            document.getElementById('dom-ing').innerText = `+$${i.toLocaleString()}`;
            document.getElementById('dom-egr').innerText = `-$${e.toLocaleString()}`;
            document.getElementById('dom-list').innerHTML = mHtml;
            renderChart(movements);
            lucide.createIcons();
        }

        function renderChart(movements) {
            const ctx = document.getElementById('lineChart').getContext('2d');
            let b = 0; const pts = [...movements].reverse().map(x => { b += (x.t === 'in' ? x.a : -x.a); return b; });
            if(window.lc) window.lc.destroy();
            window.lc = new Chart(ctx, {
                type: 'line',
                data: { labels: pts.map(()=>''), datasets: [{ data: pts, borderColor: '#4f46e5', borderWidth: 3, tension: 0.4, pointRadius: 0, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' }] },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function switchTab(tab, el) {
            document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
            document.getElementById(tab).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        function openM() { document.getElementById('modal').style.display = 'flex'; }
        function closeM() { document.getElementById('modal').style.display = 'none'; }
        
        initApp();
        lucide.createIcons();
    </script>
</body>
</html>
