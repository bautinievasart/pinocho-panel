<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinocho Scanner V3 | ByBauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #F4F7FE; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF;
            --text-main: #1B2559; --text-sec: #A3AED0; --accent: #4318FF;
            --success: #05CD99; --danger: #EE5D50; --border: #E9EDF7;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
            --led-rojo: linear-gradient(135deg, #FF5B5B, #F067B4, #FF5B5B);
        }
        * { box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }
        .sidebar { width: 260px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 40px 20px; border-right: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: 800; margin-bottom: 40px; }
        .logo span { color: var(--accent); }
        .nav-item { color: var(--text-sec); padding: 15px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; font-weight: 700; margin-bottom: 10px; transition: 0.3s; }
        .nav-item.active { background: #F4F7FE; color: var(--accent); }
        .main { margin-left: 260px; width: 100%; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid var(--border); }
        .card-label { font-size: 11px; color: var(--text-sec); font-weight: 800; text-transform: uppercase; }
        .big-val { font-size: 28px; font-weight: 800; margin-top: 10px; }
        .flow-text { background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 3s linear infinite; }
        @keyframes flow { to { background-position: 200% center; } }
        .n-blue { background-image: var(--led-blue); }
        .n-green { background-image: var(--led-verde); }
        .n-rojo { background-image: var(--led-rojo); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; font-size: 11px; color: var(--text-sec); padding: 10px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 700; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; background: #EEE; color: #666; font-weight: 800; }
        .coin-usdt { background: #e6fcf5; color: #087f5b; }
        .coin-btc { background: #fff4e6; color: #d9480f; }
        .coin-eth { background: #f3f0ff; color: #5f3dc4; }
        .coin-sol { background: #e3fafc; color: #0b7285; }
        .view { display: none; } .view.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-item active" onclick="show('v-dash', this)"><i class="fa-solid fa-bolt"></i> Escáner</div>
        <div class="nav-item" onclick="show('v-ops', this)"><i class="fa-solid fa-list"></i> Operaciones</div>
        <div class="nav-item" onclick="cambiarCap()"><i class="fa-solid fa-sack-dollar"></i> Capital</div>
    </div>

    <div class="main">
        <div id="v-dash" class="view active">
            <div class="grid">
                <div class="card"><div class="card-label">Mi Capital</div><div id="cap-txt" class="big-val flow-text n-blue">$0</div></div>
                <div class="card"><div class="card-label">Dólar MEP</div><div id="mep-txt" class="big-val flow-text n-blue">$0</div></div>
                <div class="card"><div class="card-label">Siguiente Scan</div><div id="timer-txt" class="big-val flow-text n-blue">--s</div></div>
                <div class="card"><div class="card-label">Mejor Opción</div><div id="top-txt" class="big-val flow-text n-green">$0</div><div id="top-deal" style="font-size:11px;font-weight:800;color:var(--accent)">Buscando...</div></div>
            </div>

            <div class="card">
                <div class="card-label">Oportunidades en Tiempo Real</div>
                <table>
                    <thead><tr><th>MONEDA / EX</th><th>COMPRA</th><th>P2P VENTA</th><th>GANANCIA</th><th>BRECHA</th></tr></thead>
                    <tbody id="data-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let CAPITAL = localStorage.getItem('b-cap') ? parseFloat(localStorage.getItem('b-cap')) : 300000;
        let timer = 1; 
        const COINS = ['usdt', 'btc', 'eth', 'sol'];
        const EXS = ['lemoncash', 'belo', 'buenbit', 'fiwind', 'tiendacrypto', 'ripio'];

        async function update() {
            try {
                // 1. Dolar MEP
                const rMep = await fetch('https://dolarapi.com/v1/dolares/bolsa');
                const dMep = await rMep.json();
                document.getElementById('mep-txt').innerText = `$${dMep.venta}`;

                let html = "";
                let bestP = -999999;
                let bestD = "Analizando...";

                // 2. Fetch de todas las monedas en paralelo
                const promises = COINS.map(c => fetch(`https://criptoya.com/api/${c}/ars/1`).then(r => r.json()));
                const results = await Promise.all(promises);

                results.forEach((data, index) => {
                    const coinName = COINS[index];
                    const p2pSell = data.binancep2p ? data.binancep2p.bid : 0;

                    if(p2pSell > 0) {
                        EXS.forEach(ex => {
                            if(data[ex]) {
                                const ask = data[ex].ask;
                                const profit = (CAPITAL / ask * p2pSell) - CAPITAL;
                                const spread = ((p2pSell / ask) - 1) * 100;

                                if(profit > bestP) {
                                    bestP = profit;
                                    bestD = `COMPRA ${coinName.toUpperCase()} EN ${ex.toUpperCase()}`;
                                }

                                html += `<tr>
                                    <td><span class="badge coin-${coinName}">${coinName.toUpperCase()}</span> ${ex.toUpperCase()}</td>
                                    <td>$${ask.toLocaleString()}</td>
                                    <td>$${p2pSell.toLocaleString()}</td>
                                    <td class="flow-text ${profit>=0?'n-green':'n-rojo'}">$${Math.abs(profit).toFixed(0)}</td>
                                    <td style="color:${spread>=0?'var(--success)':'var(--danger)'}">${spread.toFixed(2)}%</td>
                                </tr>`;
                            }
                        });
                    }
                });

                document.getElementById('data-body').innerHTML = html;
                document.getElementById('top-txt').innerText = `$${bestP.toFixed(0)}`;
                document.getElementById('top-deal').innerText = bestD;
                document.getElementById('cap-txt').innerText = `$${CAPITAL.toLocaleString()}`;
                timer = 30;

            } catch (e) {
                console.error("Error capturando datos", e);
                timer = 5;
            }
        }

        setInterval(() => {
            timer--;
            document.getElementById('timer-txt').innerText = timer + 's';
            if(timer <= 0) update();
        }, 1000);

        function cambiarCap() { let p = prompt("Capital ARS:", CAPITAL); if(p) { CAPITAL = parseFloat(p); localStorage.setItem('b-cap', CAPITAL); update(); } }
        function show(id, el) { 
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        update();
    </script>
</body>
</html>
