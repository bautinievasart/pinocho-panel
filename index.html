<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinocho Arbitraje Pro | ByBauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #F4F7FE; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF;
            --text-main: #1B2559; --text-sec: #A3AED0; --accent: #4318FF;
            --success: #05CD99; --danger: #EE5D50; --border: #E9EDF7;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }
        
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; padding: 40px 24px; border-right: 1px solid var(--border); z-index: 1000; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 50px; color: #2B3674; }
        .logo span { color: var(--accent); }
        .nav-item { color: var(--text-sec); padding: 16px 20px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; transition: 0.3s; margin-bottom: 8px; }
        .nav-item.active { background: #F4F7FE; color: var(--accent); border-right: 4px solid var(--accent); }

        .main-wrapper { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }
        .grid-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); }
        .card-label { font-size: 11px; color: var(--text-sec); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        
        .big-val { font-size: 32px; font-weight: 800; margin: 5px 0; }
        .flow-text { background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; }
        .blue-flow { background-image: var(--led-blue); }
        .green-flow { background-image: var(--led-verde); }
        @keyframes flow { to { background-position: 200% center; } }

        .table-card { padding: 30px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 12px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 700; color: #2B3674; }
        
        .badge-coin { background: var(--accent); color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; margin-right: 8px; }
        .ex-name { color: var(--text-sec); font-size: 12px; font-weight: 600; }
        .profit-tag { color: var(--success); font-weight: 800; }
        .loss-tag { color: var(--danger); font-weight: 800; }
        
        .status-dot { height: 10px; width: 10px; background-color: var(--success); border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-container">
            <div class="nav-item active"><i class="fa-solid fa-bolt"></i><span>Escáner Live</span></div>
            <div class="nav-item" onclick="cambiarCapital()"><i class="fa-solid fa-wallet"></i><span>Capital</span></div>
            <div class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i><span>Historial</span></div>
        </div>
    </div>

    <div class="main-wrapper">
        <h1 id="title">Scanner de Brechas ARS</h1>
        
        <div class="grid-top">
            <div class="card"><div class="card-label">Tu Capital</div><div id="cap-display" class="big-val flow-text blue-flow">$0</div></div>
            <div class="card"><div class="card-label">Dólar MEP</div><div id="mep-display" class="big-val flow-text blue-flow">$0</div></div>
            <div class="card"><div class="card-label">Mejor Oportunidad</div><div id="best-opp" class="big-val flow-text green-flow">$0</div></div>
        </div>

        <div class="card table-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div class="card-label">Monitor de Exchanges vs P2P</div>
                <div id="status-msg" style="font-size: 12px; font-weight: 700; color: var(--accent);"><span class="status-dot"></span>Iniciando...</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>MERCADO / EXCHANGE</th>
                        <th>COSTO COMPRA</th>
                        <th>VENTA P2P (Binance)</th>
                        <th>GANANCIA EST.</th>
                        <th>BRECHA %</th>
                    </tr>
                </thead>
                <tbody id="scanner-body">
                    <!-- Filas dinámicas -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let CAPITAL = localStorage.getItem('b-cap') ? parseFloat(localStorage.getItem('b-cap')) : 500000;
        const EXCHANGES = ['lemoncash', 'belo', 'buenbit', 'fiwind', 'tiendacrypto', 'ripio'];
        const COINS = ['usdt', 'usdc', 'dai', 'btc', 'eth', 'sol'];
        let isScanning = false;

        async function updateScanner() {
            if(isScanning) return;
            isScanning = true;
            document.getElementById('status-msg').innerHTML = '<span class="status-dot" style="background:orange"></span>Escaneando monedas...';
            
            try {
                // 1. Dólar MEP
                const rMep = await fetch('https://dolarapi.com/v1/dolares/bolsa');
                const dMep = await rMep.json();
                document.getElementById('mep-display').innerText = `$${dMep.venta.toFixed(2)}`;
                document.getElementById('cap-display').innerText = `$${CAPITAL.toLocaleString()}`;

                let html = "";
                let maxProfit = 0;

                // 2. Escaneo secuencial para evitar BAN de CriptoYa
                for (let coin of COINS) {
                    try {
                        const res = await fetch(`https://criptoya.com/api/${coin}/ars/1`);
                        const data = await res.json();
                        const p2pSell = data.binancep2p ? data.binancep2p.bid : 0;

                        if(p2pSell > 0) {
                            EXCHANGES.forEach(ex => {
                                if(data[ex] && data[ex].ask) {
                                    const cost = data[ex].ask;
                                    const profit = (CAPITAL / cost * p2pSell) - CAPITAL;
                                    const spread = ((p2pSell / cost) - 1) * 100;

                                    if(profit > maxProfit) maxProfit = profit;

                                    html += `
                                        <tr>
                                            <td><span class="badge-coin">${coin.toUpperCase()}</span> <span class="ex-name">${ex.toUpperCase()}</span></td>
                                            <td>$${cost.toLocaleString()}</td>
                                            <td>$${p2pSell.toLocaleString()}</td>
                                            <td class="${profit >= 0 ? 'profit-tag' : 'loss-tag'}">$${profit.toFixed(0)}</td>
                                            <td style="color:${spread >= 0 ? 'var(--success)' : 'var(--danger)'}">${spread.toFixed(2)}%</td>
                                        </tr>
                                    `;
                                }
                            });
                        }
                        // Actualizar tabla progresivamente
                        document.getElementById('scanner-body').innerHTML = html;
                        // Delay de cortesía para la API (300ms)
                        await new Promise(r => setTimeout(r, 300));
                    } catch(e) { console.warn("Error en " + coin); }
                }

                document.getElementById('best-opp').innerText = `$${maxProfit.toFixed(0)}`;
                document.getElementById('status-msg').innerHTML = '<span class="status-dot"></span>Sincronizado';

            } catch (error) {
                document.getElementById('status-msg').innerHTML = '<span class="status-dot" style="background:red"></span>Error de conexión';
            }
            isScanning = false;
        }

        function cambiarCapital() {
            let val = prompt("Nuevo Capital ARS:", CAPITAL);
            if(val) { CAPITAL = parseFloat(val); localStorage.setItem('b-cap', CAPITAL); updateScanner(); }
        }

        // Ejecución inicial y bucle cada 60 segundos (seguro para la API)
        updateScanner();
        setInterval(updateScanner, 60000);
    </script>
</body>
</html>
