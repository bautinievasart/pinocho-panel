<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinocho Suite V5 | Operaciones Reales</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #F4F7FE; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF;
            --text-main: #1B2559; --text-sec: #A3AED0; --accent: #4318FF;
            --success: #05CD99; --danger: #EE5D50; --border: #E9EDF7;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); display: flex; color: var(--text-main); min-height: 100vh; }

        /* SIDEBAR PRO */
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; padding: 40px 24px; border-right: 1px solid var(--border); z-index: 1000; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 50px; color: #2B3674; }
        .logo span { color: var(--accent); }
        .nav-item { color: var(--text-sec); padding: 16px 20px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; transition: 0.3s; margin-bottom: 8px; }
        .nav-item.active { background: #F4F7FE; color: var(--accent); border-right: 4px solid var(--accent); }
        .nav-item:hover { background: #F4F7FE; color: var(--accent); }

        /* CONTENIDO */
        .main-wrapper { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }
        .grid-top { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid var(--border); box-shadow: 0px 12px 30px rgba(0, 0, 0, 0.02); position: relative; overflow: hidden; }
        .card-label { font-size: 11px; color: var(--text-sec); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .big-val { font-size: 32px; font-weight: 800; margin: 5px 0; letter-spacing: -1px; }

        /* EFECTOS LED */
        .flow-text { background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; }
        .blue-flow { background-image: var(--led-blue); }
        .green-flow { background-image: var(--led-verde); }
        @keyframes flow { to { background-position: 200% center; } }

        /* TABLA DE ARBITRAJE */
        .table-card { padding: 30px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 15px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        td { padding: 18px 15px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 700; }
        
        .coin-tag { background: #F4F7FE; color: var(--accent); padding: 6px 12px; border-radius: 8px; font-size: 11px; margin-right: 8px; }
        .profit { color: var(--success); }
        .loss { color: var(--danger); }
        .status-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 20px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 10px var(--success); }

        @media (max-width: 1024px) { .grid-top { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-item active"><i class="fa-solid fa-bolt"></i><span>Escáner Live</span></div>
        <div class="nav-item" onclick="cambiarCapital()"><i class="fa-solid fa-wallet"></i><span>Ajustar Capital</span></div>
        <div class="nav-item"><i class="fa-solid fa-shuffle"></i><span>Operaciones</span></div>
        <div class="nav-item"><i class="fa-solid fa-box-archive"></i><span>Caja</span></div>
    </nav>

    <main class="main-wrapper">
        <h1>Monitor de Brechas <small style="font-size: 14px; color: var(--text-sec); font-weight: 500;">Real-time Data</small></h1>
        
        <div class="grid-top">
            <div class="card">
                <div class="card-label">Capital ARS</div>
                <div id="cap-display" class="big-val flow-text blue-flow">$0</div>
            </div>
            <div class="card">
                <div class="card-label">Dólar MEP</div>
                <div id="mep-val" class="big-val flow-text blue-flow">$0.00</div>
            </div>
            <div class="card">
                <div class="card-label">Mejor Ganancia Est.</div>
                <div id="best-profit" class="big-val flow-text green-flow">$0</div>
            </div>
        </div>

        <div class="card table-card">
            <div class="status-bar"><div class="dot" id="sync-dot"></div> <span id="status-text">Sincronizando mercados...</span></div>
            <table>
                <thead>
                    <tr>
                        <th>MONEDA / EXCHANGE</th>
                        <th>PRECIO COMPRA</th>
                        <th>VENTA P2P (Binance)</th>
                        <th>GANANCIA (ARS)</th>
                        <th>BRECHA %</th>
                    </tr>
                </thead>
                <tbody id="scanner-table">
                    <!-- Dinámico -->
                </tbody>
            </table>
        </div>
    </main>

    <script>
        let CAPITAL = localStorage.getItem('b-cap') ? parseFloat(localStorage.getItem('b-cap')) : 100000;
        const EXCHANGES = ['lemoncash', 'belo', 'buenbit', 'fiwind', 'tiendacrypto', 'ripio', 'letsbit'];
        const COINS = ['usdt', 'usdc', 'dai', 'btc', 'eth', 'sol', 'ada', 'xrp'];
        
        async function fetchMep() {
            try {
                const r = await fetch('https://dolarapi.com/v1/dolares/bolsa');
                const d = await r.json();
                document.getElementById('mep-val').innerText = `$${d.venta.toFixed(2)}`;
            } catch(e) { console.error("Error MEP"); }
        }

        async function startScanner() {
            document.getElementById('cap-display').innerText = `$${CAPITAL.toLocaleString()}`;
            document.getElementById('status-text').innerText = "ACTUALIZANDO EXCHANGES...";
            document.getElementById('sync-dot').style.background = "orange";
            
            await fetchMep();
            let fullHtml = "";
            let topProfit = 0;

            // Escaneo por moneda para no saturar
            for (let coin of COINS) {
                try {
                    const response = await fetch(`https://criptoya.com/api/${coin}/ars/1`);
                    if (!response.ok) continue;
                    const data = await response.json();
                    
                    const p2pSell = data.binancep2p ? data.binancep2p.bid : 0;
                    if (p2pSell <= 0) continue;

                    EXCHANGES.forEach(ex => {
                        if (data[ex] && data[ex].ask) {
                            const buyPrice = data[ex].ask;
                            const profit = (CAPITAL / buyPrice * p2pSell) - CAPITAL;
                            const spread = ((p2pSell / buyPrice) - 1) * 100;

                            if (profit > topProfit) topProfit = profit;

                            fullHtml += `
                                <tr>
                                    <td><span class="coin-tag">${coin.toUpperCase()}</span> ${ex.toUpperCase()}</td>
                                    <td>$${buyPrice.toLocaleString()}</td>
                                    <td>$${p2pSell.toLocaleString()}</td>
                                    <td class="${profit > 0 ? 'profit' : 'loss'}">$${profit.toFixed(0)}</td>
                                    <td class="${spread > 0 ? 'profit' : 'loss'}">${spread.toFixed(2)}%</td>
                                </tr>
                            `;
                        }
                    });
                    // Actualización parcial para que no parezca trabado
                    document.getElementById('scanner-table').innerHTML = fullHtml;
                    await new Promise(r => setTimeout(r, 200)); // Delay de seguridad
                } catch (err) { console.log("Salteando " + coin); }
            }

            document.getElementById('best-profit').innerText = `$${topProfit.toFixed(0)}`;
            document.getElementById('status-text').innerText = "MERCADOS AL DÍA";
            document.getElementById('sync-dot').style.background = "var(--success)";
        }

        function cambiarCapital() {
            let n = prompt("Ingresá tu capital de trabajo (ARS):", CAPITAL);
            if(n) { CAPITAL = parseFloat(n); localStorage.setItem('b-cap', CAPITAL); startScanner(); }
        }

        // Inicio
        startScanner();
        // Refresco cada 1 minuto (seguro para evitar ban de IP)
        setInterval(startScanner, 60000);
    </script>
</body>
</html>
