<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinocho Mega Scanner FIX | ByBauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-main: #F4F7FE; --sidebar-bg: #FFFFFF; --card-bg: #FFFFFF;
            --text-main: #1B2559; --text-sec: #A3AED0; --accent: #4318FF;
            --success: #05CD99; --danger: #EE5D50; --border: #E9EDF7;
            --led-blue: linear-gradient(135deg, #4318FF, #B23AF3, #4318FF);
            --led-verde: linear-gradient(135deg, #05CD99, #66DDAA, #05CD99);
            --led-rojo: linear-gradient(135deg, #FF5B5B, #F067B4, #FF5B5B);
        }
        * { box-sizing: border-box; outline: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-main); margin: 0; display: flex; color: var(--text-main); min-height: 100vh; }
        .sidebar { width: 280px; background: var(--sidebar-bg); height: 100vh; position: fixed; left: 0; top: 0; padding: 40px 24px; border-right: 1px solid var(--border); z-index: 1000; }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 50px; color: #2B3674; }
        .logo span { color: var(--accent); }
        .nav-item { color: var(--text-sec); padding: 16px 20px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 15px; font-weight: 700; transition: 0.3s; margin-bottom: 8px; }
        .nav-item.active { background: #F4F7FE; color: var(--accent); border-right: 4px solid var(--accent); }
        .main-wrapper { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; border: 1px solid var(--border); position: relative; }
        .card-label { font-size: 11px; color: var(--text-sec); font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .flow-text { font-weight: 800; background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: flow 4s linear infinite; display: inline-block; }
        @keyframes flow { to { background-position: 200% center; } }
        .num-blue { background-image: var(--led-blue); }
        .num-green { background-image: var(--led-verde); }
        .num-rojo { background-image: var(--led-rojo); }
        .big-val { font-size: 28px; margin: 5px 0; }
        .table-card { padding: 25px; margin-top: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--text-sec); font-size: 11px; padding: 12px; border-bottom: 1px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #F4F7FE; font-size: 14px; font-weight: 700; color: #2B3674; }
        .badge-coin { padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-right: 5px; display: inline-block; min-width: 45px; text-align: center; color: white; background: #666; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        input, select { background: #F4F7FE; border: 1px solid var(--border); padding: 12px; border-radius: 12px; font-weight: 600; width: 100%; color: var(--text-main); }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">By<span>Bauti</span></div>
        <div class="nav-container">
            <div class="nav-item active" onclick="show('v-dash', this)"><i class="fa-solid fa-bolt"></i><span>Escáner Live</span></div>
            <div class="nav-item" onclick="show('v-ops', this)"><i class="fa-solid fa-list-check"></i><span>Operaciones</span></div>
            <div class="nav-item" onclick="show('v-pre', this)"><i class="fa-solid fa-wallet"></i><span>Caja / Gastos</span></div>
            <div class="nav-item" onclick="cambiarCapital()"><i class="fa-solid fa-gear"></i><span>Config Capital</span></div>
        </div>
    </div>

    <div class="main-wrapper">
        <div id="v-dash" class="view-section active">
            <h1>Monitor Pro v4</h1>
            <div class="grid-top">
                <div class="card"><div class="card-label">Capital ARS</div><div id="cap-display" class="flow-text num-blue big-val">$0</div></div>
                <div class="card"><div class="card-label">Dólar MEP</div><div id="val-mep" class="flow-text num-blue big-val">$0.00</div></div>
                <div class="card"><div class="card-label">Estado</div><div id="status-txt" class="flow-text num-blue big-val">Reposo</div></div>
                <div class="card"><div class="card-label">Top Arbitraje</div><div id="top-gan" class="flow-text num-green big-val">$0</div><div id="top-ex" style="font-size:11px;font-weight:800;color:var(--accent);margin-top:5px">Calculando...</div></div>
            </div>

            <div class="card table-card">
                <table>
                    <thead><tr><th>MONEDA / EX</th><th>COMPRA</th><th>P2P BINANCE</th><th>GANANCIA</th><th>BRECHA</th></tr></thead>
                    <tbody id="table-scanner"></tbody>
                </table>
            </div>
        </div>

        <div id="v-ops" class="view-section">
            <h1>Operaciones</h1>
            <div class="card"><div class="form-row">
                <input type="number" id="o-monto" placeholder="ARS"><input type="number" id="o-buy" placeholder="Compra"><input type="number" id="o-sell" placeholder="Venta"><button class="btn-add" onclick="addOp()">Registrar</button>
            </div></div>
            <div class="card table-card"><table><tbody id="hist-ops"></tbody></table></div>
        </div>

        <div id="v-pre" class="view-section">
            <h1>Caja</h1>
            <div class="card"><div class="form-row">
                <input type="date" id="p-fecha"><input type="text" id="p-desc" placeholder="Detalle"><input type="number" id="p-monto" placeholder="Monto"><select id="p-tipo"><option value="out">Gasto</option><option value="in">Ingreso</option></select><button class="btn-add" onclick="addPre()">Cargar</button>
            </div></div>
            <div class="card table-card"><table><tbody id="hist-pre"></tbody></table></div>
        </div>
    </div>

    <script>
        let CAPITAL = localStorage.getItem('b-cap') ? parseFloat(localStorage.getItem('b-cap')) : 100000;
        let dbOps = JSON.parse(localStorage.getItem('b-ops')) || [];
        let dbPre = JSON.parse(localStorage.getItem('b-pre')) || [];
        let isScanning = false;

        const COINS = ['usdt', 'usdc', 'dai', 'btc', 'wbtc', 'eth', 'sol', 'ada', 'bnb', 'xrp', 'trx', 'doge', 'bch', 'xlm', 'dot'];
        const EXS = ['lemoncash', 'belo', 'buenbit', 'fiwind', 'tiendacrypto', 'ripio'];

        async function scan() {
            if(isScanning) return;
            isScanning = true;
            document.getElementById('status-txt').innerText = "Escaneando...";
            
            try {
                const rMep = await fetch('https://dolarapi.com/v1/dolares/bolsa');
                const dMep = await rMep.json();
                document.getElementById('val-mep').innerText = `$${dMep.venta}`;

                let html = "", bestP = -999999, bestD = "Buscando...";

                // CARGA SECUENCIAL PARA NO SATURAR API
                for (let coin of COINS) {
                    try {
                        const r = await fetch(`https://criptoya.com/api/${coin}/ars/1`);
                        const data = await r.json();
                        const p2pSell = data.binancep2p ? data.binancep2p.bid : 0;

                        if(p2pSell > 0) {
                            EXS.forEach(ex => {
                                if(data[ex]) {
                                    const cost = data[ex].ask;
                                    const profit = (CAPITAL / cost * p2pSell) - CAPITAL;
                                    const spread = ((p2pSell / cost) - 1) * 100;
                                    if(profit > bestP) { bestP = profit; bestD = `COMPRA ${coin.toUpperCase()} EN ${ex.toUpperCase()}`; }

                                    html += `<tr>
                                        <td><span class="badge-coin">${coin.toUpperCase()}</span> ${ex.toUpperCase()}</td>
                                        <td>$${cost.toLocaleString()}</td>
                                        <td>$${p2pSell.toLocaleString()}</td>
                                        <td class="flow-text ${profit >= 0 ? 'num-green' : 'num-rojo'}">$${Math.abs(profit).toFixed(0)}</td>
                                        <td style="color:${spread >= 0 ? '#05CD99' : '#EE5D50'}">${spread.toFixed(2)}%</td>
                                    </tr>`;
                                }
                            });
                        }
                        // Pequeño delay de 200ms entre monedas para que la API no nos rebote
                        await new Promise(res => setTimeout(res, 200));
                        document.getElementById('table-scanner').innerHTML = html; // Va llenando la tabla de a poco
                    } catch(e) { console.warn("Error en moneda: " + coin); }
                }

                document.getElementById('top-gan').innerText = `$${bestP.toFixed(0)}`;
                document.getElementById('top-ex').innerText = bestD;
                document.getElementById('cap-display').innerText = `$${CAPITAL.toLocaleString()}`;
                
            } catch (e) { console.error(e); }
            
            isScanning = false;
            document.getElementById('status-txt').innerText = "Esperando...";
        }

        function show(id, el) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }

        function addOp() {
            const m = parseFloat(document.getElementById('o-monto').value);
            const b = parseFloat(document.getElementById('o-buy').value);
            const s = parseFloat(document.getElementById('o-sell').value);
            if(m && b && s) { dbOps.unshift({id: Date.now(), f: new Date().toLocaleDateString(), m, gan: (m/b*s)-m}); save(); render(); }
        }

        function addPre() {
            const f = document.getElementById('p-fecha').value;
            const d = document.getElementById('p-desc').value;
            const m = parseFloat(document.getElementById('p-monto').value);
            const t = document.getElementById('p-tipo').value;
            if(f && d && m) { dbPre.unshift({id: Date.now(), f, d, m, t}); save(); render(); }
        }

        function deleteItem(type, id) {
            if(type === 'op') dbOps = dbOps.filter(i => i.id !== id);
            else dbPre = dbPre.filter(i => i.id !== id);
            save(); render();
        }

        function save() {
            localStorage.setItem('b-ops', JSON.stringify(dbOps));
            localStorage.setItem('b-pre', JSON.stringify(dbPre));
            localStorage.setItem('b-cap', CAPITAL);
        }

        function render() {
            document.getElementById('hist-ops').innerHTML = dbOps.map(o => `<tr><td>${o.f}</td><td>$${o.m.toLocaleString()}</td><td class="num-green">$${o.gan.toFixed(0)}</td><td><i class="fa-solid fa-trash" style="cursor:pointer;color:#EE5D50" onclick="deleteItem('op', ${o.id})"></i></td></tr>`).join('');
            document.getElementById('hist-pre').innerHTML = dbPre.map(p => `<tr><td>${p.f}</td><td>${p.d}</td><td style="color:${p.t==='in'?'#05CD99':'#EE5D50'}">${p.t==='in'?'+':'-'}$${p.m.toLocaleString()}</td><td><i class="fa-solid fa-trash" style="cursor:pointer;color:#EE5D50" onclick="deleteItem('pre', ${p.id})"></i></td></tr>`).join('');
        }

        function cambiarCapital() {
            let p = prompt("Nuevo Capital ARS:", CAPITAL);
            if(p) { CAPITAL = parseFloat(p); save(); scan(); }
        }

        // Scan cada 1 minuto para no ser baneado por la API
        setInterval(scan, 60000);

        document.getElementById('p-fecha').valueAsDate = new Date();
        scan(); render();
    </script>
</body>
</html>
