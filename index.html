<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly Premium | Bauti</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primario: #6366f1; --fondo: #fcfcfd; --texto-oscuro: #0f172a; --texto-gris: #64748b;
            --blanco: #ffffff; --exito: #10b981; --error: #f43f5e;
            --gradiente-main: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --sombra-soft: 0 20px 25px -5px rgba(0, 0, 0, 0.03), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #f1f5f9; display: flex; justify-content: center; color: var(--texto-oscuro); }

        .app-container {
            width: 100%; max-width: 450px; background: var(--fondo); min-height: 100vh;
            position: relative; box-shadow: 0 0 100px rgba(0,0,0,0.1); padding-bottom: 110px; overflow-x: hidden;
        }

        .vista { display: none; animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .vista.activa { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- HEADER PREMIUM --- */
        .header-app {
            background: var(--gradiente-main); color: white;
            padding: 50px 25px 100px 25px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            position: relative;
        }
        .monto-balance { font-size: 3.8rem; font-weight: 800; letter-spacing: -3px; margin: 10px 0; }
        .badge-usd { background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.2); }

        /* --- DASHBOARD CARDS --- */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px; margin-top: -55px; }
        .stat-card {
            background: white; padding: 20px 5px; border-radius: 22px; text-align: center;
            box-shadow: var(--sombra-soft); border: 1px solid rgba(0,0,0,0.02);
        }
        .stat-card span { font-size: 0.65rem; font-weight: 800; color: var(--texto-gris); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
        .stat-card strong { font-size: 1.1rem; font-weight: 800; }

        /* --- MOVIMIENTOS --- */
        .movimiento-row {
            background: white; margin: 0 20px 12px 20px; padding: 16px; border-radius: 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.01); border: 1px solid rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }
        .movimiento-row:active { transform: scale(0.98); }
        .icon-box { width: 48px; height: 48px; border-radius: 15px; display: flex; align-items: center; justify-content: center; }

        /* --- NAVBAR --- */
        .nav-bar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 90px;
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: 20px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .nav-item { color: #cbd5e1; padding: 12px; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--primario); }
        .fab-add { 
            width: 64px; height: 64px; background: var(--texto-oscuro); color: white;
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            transform: translateY(-35px); box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: none;
        }

        /* --- MODAL --- */
        #modal-add { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; align-items: flex-end; z-index: 100; backdrop-filter: blur(8px); }
        .modal-body { background: white; width: 100%; padding: 40px 30px; border-radius: 40px 40px 0 0; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        input, select { width: 100%; padding: 18px; border-radius: 18px; border: 1px solid #f1f5f9; background: #f8fafc; margin-bottom: 15px; font-size: 1rem; font-weight: 600; outline: none; }
        .btn-confirm { width: 100%; padding: 20px; background: var(--primario); color: white; border: none; border-radius: 20px; font-weight: 800; font-size: 1rem; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- VISTA HOME -->
        <div id="v-home" class="vista activa">
            <div class="header-app">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="width:45px; height:45px; border-radius:14px; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; font-weight:900; border:1px solid rgba(255,255,255,0.3);" id="user-initial">B</div>
                        <p style="font-weight:700;" id="user-name">Bauti</p>
                    </div>
                    <i data-lucide="bell" size="20"></i>
                </div>
                <h1 class="monto-balance" id="main-balance">$0</h1>
                <div class="badge-usd" id="usd-convert">
                    <i data-lucide="trending-up" size="14"></i> Calculando...
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card"><span>Ingresos</span><strong style="color:var(--exito)" id="total-ing">$0</strong></div>
                <div class="stat-card"><span>Gastos</span><strong style="color:var(--error)" id="total-egr">$0</strong></div>
                <div class="stat-card"><span>Balance</span><strong style="color:var(--primario)" id="total-net">$0</strong></div>
            </div>

            <div style="padding: 30px 20px;">
                <h3 style="font-weight:800; margin-bottom:15px; font-size:1.1rem;">Actividad Real</h3>
                <div style="background:white; border-radius:28px; padding:20px; box-shadow: var(--sombra-soft);">
                    <canvas id="waveChart" height="150"></canvas>
                </div>
                
                <h3 style="font-weight:800; margin-top:30px; margin-bottom:15px; font-size:1.1rem;">Movimientos</h3>
                <div id="list-movs"></div>
            </div>
        </div>

        <!-- VISTA ANALISIS -->
        <div id="v-stats" class="vista">
            <div style="padding: 50px 25px;">
                <h1 style="font-weight:900; font-size:2rem; letter-spacing:-1px;">Análisis</h1>
                <p style="color:var(--texto-gris); margin-bottom:30px;">Distribución de tus egresos</p>
                <div style="background:white; border-radius:30px; padding:30px; box-shadow: var(--sombra-soft);">
                    <canvas id="pieChart"></canvas>
                </div>
                <div id="pie-labels" style="margin-top:20px;"></div>
            </div>
        </div>

        <!-- NAVBAR -->
        <div class="nav-bar">
            <div class="nav-item active" onclick="changeTab('v-home', this)"><i data-lucide="layout-grid"></i></div>
            <div class="nav-item"><i data-lucide="target"></i></div>
            <button class="fab-add" onclick="toggleModal(true)"><i data-lucide="plus" size="32"></i></button>
            <div class="nav-item" onclick="changeTab('v-stats', this)"><i data-lucide="pie-chart"></i></div>
            <div class="nav-item"><i data-lucide="user"></i></div>
        </div>

        <!-- MODAL ADD -->
        <div id="modal-add" onclick="if(event.target==this) toggleModal(false)">
            <div class="modal-body">
                <div style="width:40px; height:5px; background:#e2e8f0; border-radius:10px; margin:-20px auto 30px auto;"></div>
                <h2 style="font-weight:800; margin-bottom:20px;">Nuevo Registro</h2>
                <input type="text" id="in-desc" placeholder="¿Qué compraste?">
                <input type="number" id="in-amount" placeholder="Monto $">
                <select id="in-type">
                    <option value="egreso">Gasto</option>
                    <option value="ingreso">Ingreso</option>
                </select>
                <button class="btn-confirm" onclick="saveNew()">Agregar a mi cuenta</button>
            </div>
        </div>
    </div>

    <script>
        let storage = JSON.parse(localStorage.getItem('f_data_v5')) || { movements: [] };

        function changeTab(id, el) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('activa');
            if(el) el.classList.add('active');
            if(id === 'v-home') updateWaveChart();
            if(id === 'v-stats') updatePieChart();
        }

        function toggleModal(show) { document.getElementById('modal-add').style.display = show ? 'flex' : 'none'; }

        function saveNew() {
            const d = document.getElementById('in-desc').value;
            const a = parseFloat(document.getElementById('in-amount').value);
            const t = document.getElementById('in-type').value;
            if(!d || !a) return;
            storage.movements.unshift({ id: Date.now(), desc: d, amount: a, type: t, date: new Date().toLocaleDateString('es-AR') });
            localStorage.setItem('f_data_v5', JSON.stringify(storage));
            updateUI();
            toggleModal(false);
            // Limpiar inputs
            document.getElementById('in-desc').value = '';
            document.getElementById('in-amount').value = '';
        }

        function deleteItem(id) {
            storage.movements = storage.movements.filter(m => m.id !== id);
            localStorage.setItem('f_data_v5', JSON.stringify(storage));
            updateUI();
        }

        function updateUI() {
            let ing = 0, egr = 0;
            const list = document.getElementById('list-movs');
            list.innerHTML = '';

            storage.movements.forEach((m, i) => {
                const isIng = m.type === 'ingreso';
                if(isIng) ing += m.amount; else egr += m.amount;

                if(i < 6) {
                    list.innerHTML += `
                        <div class="movimiento-row">
                            <div style="display:flex; align-items:center; gap:15px;">
                                <div class="icon-box" style="background:${isIng ? '#dcfce7':'#fee2e2'}; color:${isIng ? '#10b981':'#f43f5e'}">
                                    <i data-lucide="${isIng ? 'arrow-up-right' : 'shopping-bag'}" size="20"></i>
                                </div>
                                <div>
                                    <p style="font-weight:800; font-size:0.95rem;">${m.desc}</p>
                                    <span style="font-size:0.75rem; color:var(--texto-gris); font-weight:600;">${m.date}</span>
                                </div>
                            </div>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <strong style="font-weight:800;">${isIng?'+':'-'}$${m.amount.toLocaleString()}</strong>
                                <button onclick="deleteItem(${m.id})" style="border:none; background:none; color:#cbd5e1; cursor:pointer;"><i data-lucide="trash-2" size="16"></i></button>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('main-balance').innerText = `$${(ing - egr).toLocaleString()}`;
            document.getElementById('total-ing').innerText = `$${ing.toLocaleString()}`;
            document.getElementById('total-egr').innerText = `$${egr.toLocaleString()}`;
            document.getElementById('total-net').innerText = `$${(ing - egr).toLocaleString()}`;

            updateWaveChart();
            fetchUSD(ing - egr);
            lucide.createIcons();
        }

        async function fetchUSD(ars) {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/USD');
                const data = await res.json();
                const rate = data.rates.ARS || 1000;
                document.getElementById('usd-convert').innerHTML = `<i data-lucide="globe" size="14"></i> Equivale a U$D ${(ars/rate).toFixed(2)}`;
                lucide.createIcons();
            } catch(e) {}
        }

        function updateWaveChart() {
            const ctx = document.getElementById('waveChart').getContext('2d');
            // Creamos data basada en los movimientos para que la onda SEA REAL
            let runningBalance = 0;
            const history = [...storage.movements].reverse().map(m => {
                runningBalance += (m.type === 'ingreso' ? m.amount : -m.amount);
                return runningBalance;
            });

            // Si no hay datos, ponemos una línea base
            const chartData = history.length > 1 ? history : [0, 10, 5, 15, 10, 20];
            const labels = chartData.map((_, i) => '');

            if(window.wChart) window.wChart.destroy();
            window.wChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: chartData,
                        borderColor: '#6366f1',
                        borderWidth: 4,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: (context) => {
                            const gradient = ctx.createLinearGradient(0, 0, 0, 150);
                            gradient.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
                            gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');
                            return gradient;
                        },
                        pointRadius: 0
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { x: { display: false }, y: { display: false } },
                    interaction: { intersect: false }
                }
            });
        }

        function updatePieChart() {
            const ctx = document.getElementById('pieChart').getContext('2d');
            const gastos = storage.movements.filter(m => m.type === 'egreso');
            const dataMap = {};
            gastos.forEach(g => { dataMap[g.desc] = (dataMap[g.desc] || 0) + g.amount; });

            if(window.pChart) window.pChart.destroy();
            window.pChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(dataMap),
                    datasets: [{
                        data: Object.values(dataMap),
                        backgroundColor: ['#6366f1', '#10b981', '#f43f5e', '#f59e0b', '#8b5cf6'],
                        hoverOffset: 20,
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '75%',
                    plugins: { legend: { display: false } }
                }
            });
        }

        updateUI();
    </script>
</body>
</html>
