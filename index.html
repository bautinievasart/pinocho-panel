<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finanzly | Mi Control Real</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primario: #6366f1;
            --fondo: #fcfcfd;
            --texto-oscuro: #0f172a;
            --texto-gris: #64748b;
            --blanco: #ffffff;
            --exito: #10b981;
            --error: #f43f5e;
            --sombra: 0 10px 25px -5px rgba(0, 0, 0, 0.04);
        }

        /* RESET Y CONTENEDOR MAESTRO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #e2e8f0; /* Fondo externo para resaltar la app */
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px; /* EVITA QUE SE ESTIRE EN PC */
            background: var(--fondo);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
            padding-bottom: 110px;
            overflow-x: hidden;
        }

        /* --- VISTAS --- */
        .vista { display: none; animation: fadeIn 0.3s ease; }
        .vista.activa { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HEADER --- */
        .header-app {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 40px 25px 80px 25px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .perfil-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .usuario { display: flex; align-items: center; gap: 12px; }
        .avatar-real { 
            width: 45px; height: 45px; border-radius: 14px; 
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; font-weight: 800;
        }

        .monto-balance { font-size: 2.5rem; font-weight: 800; margin-top: 5px; letter-spacing: -1px; }

        /* --- TARJETAS (Fila con scroll corregida) --- */
        .contenedor-scroll { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 20px;
            margin-top: -40px;
        }

        .tarjeta-cat {
            background: var(--blanco);
            padding: 15px 10px;
            border-radius: 20px;
            box-shadow: var(--sombra);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.02);
        }
        .tarjeta-cat span { font-size: 0.65rem; color: var(--texto-gris); font-weight: 700; text-transform: uppercase; display: block; margin-bottom: 4px;}
        .tarjeta-cat strong { font-size: 0.9rem; font-weight: 800; display: block; word-break: break-all; }

        /* --- SECCIONES --- */
        .seccion { padding: 25px 20px; }
        .titulo-seccion { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; color: var(--texto-oscuro); }
        .widget { background: var(--blanco); border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: var(--sombra); }

        /* --- MOVIMIENTOS --- */
        .item-movimiento { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f1f5f9; }
        .icono-mov { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .info-mov p { font-weight: 700; font-size: 0.9rem; }
        .info-mov span { font-size: 0.75rem; color: var(--texto-gris); }

        /* --- NAVEGACIÓN (Anclada al contenedor) --- */
        .nav-inferior {
            position: absolute; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(255, 255, 255, 0.98); border-top: 1px solid #f1f5f9;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 15px;
        }
        .nav-link { color: #cbd5e1; cursor: pointer; transition: 0.2s; padding: 10px; }
        .nav-link.activo { color: var(--primario); }
        
        .btn-mas { 
            width: 55px; height: 55px; background: var(--texto-oscuro); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            color: white; transform: translateY(-25px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); border: none; 
        }

        /* MODAL */
        #modal-registro { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(15, 23, 42, 0.6); display:none; align-items:flex-end; z-index:2000; }
        .modal-contenido { background: var(--blanco); width:100%; padding:30px 20px; border-radius: 35px 35px 0 0; }

        input, select { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-size: 1rem; }
        .btn-principal { width: 100%; padding: 16px; background: var(--primario); color: white; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- VISTA INICIO -->
        <div id="vista-inicio" class="vista activa">
            <div class="header-app">
                <div class="perfil-nav">
                    <div class="usuario">
                        <div class="avatar-real" id="avatar-iniciales">B</div>
                        <div>
                            <p style="font-size: 0.7rem; opacity: 0.8; font-weight: 600;">Mi Panel</p>
                            <p style="font-weight: 800; font-size: 1rem;" id="saludo-nombre">Hola, Bauti</p>
                        </div>
                    </div>
                    <button style="background:none; border:none; color:white;" onclick="navegar('vista-ajustes')">
                        <i data-lucide="settings" size="20"></i>
                    </button>
                </div>
                <p style="font-size: 0.8rem; opacity: 0.9;">Balance Actual</p>
                <h1 class="monto-balance" id="balance-total">$0,00</h1>
            </div>

            <div class="contenedor-scroll">
                <div class="tarjeta-cat">
                    <span>Ingresos</span>
                    <strong id="resumen-ingresos" style="color:var(--exito)">$0</strong>
                </div>
                <div class="tarjeta-cat">
                    <span>Gastos</span>
                    <strong id="resumen-gastos" style="color:var(--error)">$0</strong>
                </div>
                <div class="tarjeta-cat">
                    <span>Ahorro</span>
                    <strong id="resumen-ahorro-neto" style="color:var(--primario)">$0</strong>
                </div>
            </div>

            <div class="seccion">
                <div class="titulo-seccion">Actividad Reciente</div>
                <div class="widget">
                    <canvas id="graficoFlujo" height="180"></canvas>
                </div>
                <div id="lista-movimientos-inicio">
                    <!-- Dinámico -->
                </div>
            </div>
        </div>

        <!-- VISTA AJUSTES -->
        <div id="vista-ajustes" class="vista">
            <div class="seccion">
                <h2 class="titulo-seccion">Configuración</h2>
                <div class="widget">
                    <label style="font-size: 0.8rem; font-weight: 700; color: var(--texto-gris);">NOMBRE DE USUARIO</label>
                    <input type="text" id="config-nombre" placeholder="Tu nombre">
                    <button class="btn-principal" onclick="guardarConfiguracion()">Guardar Nombre</button>
                </div>
                <button onclick="resetearDatos()" style="color: var(--error); background: none; border: none; font-weight: 700; width: 100%;">Borrar todo y empezar de cero</button>
            </div>
        </div>

        <!-- NAVEGACIÓN -->
        <div class="nav-inferior">
            <div class="nav-link activo" onclick="navegar('vista-inicio', this)"><i data-lucide="home"></i></div>
            <div class="nav-link"><i data-lucide="target"></i></div>
            <button class="btn-mas" onclick="abrirModal()"><i data-lucide="plus" size="28"></i></button>
            <div class="nav-link"><i data-lucide="pie-chart"></i></div>
            <div class="nav-link" onclick="navegar('vista-ajustes', this)"><i data-lucide="user"></i></div>
        </div>

        <!-- MODAL REGISTRO -->
        <div id="modal-registro" onclick="if(event.target == this) cerrarModal()">
            <div class="modal-contenido">
                <h3 style="margin-bottom: 20px; font-weight: 800;">Nuevo Movimiento</h3>
                <input type="text" id="reg-desc" placeholder="¿En qué gastaste?">
                <input type="number" id="reg-monto" placeholder="Monto $0.00">
                <select id="reg-tipo">
                    <option value="egreso">Gasto (-)</option>
                    <option value="ingreso">Ingreso (+)</option>
                </select>
                <button class="btn-principal" onclick="registrarMovimiento()">Confirmar</button>
            </div>
        </div>

    </div> <!-- FIN APP CONTAINER -->

    <script>
        const defecto = { usuario: { nombre: 'Bauti', iniciales: 'B' }, movimientos: [] };
        let db = JSON.parse(localStorage.getItem('finanzly_db_v2')) || defecto;

        function navegar(id, el) {
            document.querySelectorAll('.vista').forEach(v => v.classList.remove('activa'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('activo'));
            document.getElementById(id).classList.add('activa');
            if(el) el.classList.add('activo');
        }

        function abrirModal() { document.getElementById('modal-registro').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-registro').style.display = 'none'; }

        function registrarMovimiento() {
            const desc = document.getElementById('reg-desc').value;
            const monto = parseFloat(document.getElementById('reg-monto').value);
            const tipo = document.getElementById('reg-tipo').value;
            if(!desc || !monto) return;

            db.movimientos.unshift({ id: Date.now(), desc, monto, tipo, fecha: 'Hoy' });
            localStorage.setItem('finanzly_db_v2', JSON.stringify(db));
            actualizarUI();
            cerrarModal();
        }

        function guardarConfiguracion() {
            const n = document.getElementById('config-nombre').value;
            if(n) {
                db.usuario.nombre = n;
                db.usuario.iniciales = n[0].toUpperCase();
                localStorage.setItem('finanzly_db_v2', JSON.stringify(db));
                actualizarUI();
                alert("Guardado");
            }
        }

        function resetearDatos() {
            if(confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); }
        }

        function actualizarUI() {
            document.getElementById('saludo-nombre').innerText = `Hola, ${db.usuario.nombre}`;
            document.getElementById('avatar-iniciales').innerText = db.usuario.iniciales;

            let total = 0, ing = 0, egr = 0;
            const lista = document.getElementById('lista-movimientos-inicio');
            lista.innerHTML = '';

            db.movimientos.forEach((m, i) => {
                const esIng = m.tipo === 'ingreso';
                if(esIng) { total += m.monto; ing += m.monto; }
                else { total -= m.monto; egr += m.monto; }

                if(i < 4) {
                    lista.innerHTML += `
                        <div class="item-movimiento">
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="icono-mov" style="background:${esIng ? '#dcfce7':'#fee2e2'}; color:${esIng ? 'var(--exito)':'var(--error)'}">
                                    <i data-lucide="${esIng ? 'plus' : 'shopping-bag'}" size="18"></i>
                                </div>
                                <div class="info-mov">
                                    <p>${m.desc}</p>
                                    <span>${m.fecha}</span>
                                </div>
                            </div>
                            <strong style="color:${esIng ? 'var(--exito)':'var(--texto-oscuro)'}">${esIng?'+':'-'}$${m.monto}</strong>
                        </div>
                    `;
                }
            });

            document.getElementById('balance-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('resumen-ingresos').innerText = `$${ing}`;
            document.getElementById('resumen-gastos').innerText = `$${egr}`;
            document.getElementById('resumen-ahorro-neto').innerText = `$${ing - egr}`;
            
            renderGrafico();
            lucide.createIcons();
        }

        function renderGrafico() {
            const ctx = document.getElementById('graficoFlujo').getContext('2d');
            if(window.chart) window.chart.destroy();
            window.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['L', 'M', 'M', 'J', 'V', 'S', 'D'],
                    datasets: [{
                        data: [20, 50, 30, 70, 40, 90, 60],
                        borderColor: '#6366f1',
                        borderWidth: 3,
                        pointRadius: 0,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(99, 102, 241, 0.05)'
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false } }, y: { display: false } }
                }
            });
        }

        actualizarUI();
    </script>
</body>
</html>
